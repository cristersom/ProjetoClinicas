<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.classList.add('dark');

        // TRADUTOR AGRESSIVO
        setInterval(() => {
            // Inputs e Dropdowns
            document.querySelectorAll('input').forEach(el => {
                if (el.placeholder === 'Select value' || el.placeholder.includes('Select')) el.placeholder = 'Selecione uma opção...';
                if (el.placeholder === 'Type to search') el.placeholder = 'Pesquisar...';
            });
            document.querySelectorAll('.ts-dropdown .no-results').forEach(el => el.innerText = 'Nenhum resultado');

            // Traduzir o Choose file to upload
            document.querySelectorAll('*').forEach(el => {
                if (el.childNodes.length > 0) {
                    el.childNodes.forEach(node => {
                        if (node.nodeType === 3) { // Se for um texto solto
                            if (node.nodeValue.includes('Choose file to upload') || node.nodeValue.includes('Choose File')) {
                                node.nodeValue = 'Escolher Imagem';
                            }
                            if (node.nodeValue.includes('No file chosen')) {
                                node.nodeValue = 'Nenhum arquivo';
                            }
                        }
                    });
                }
            });

            // Elimina redundância do Breadcrumb
            document.querySelectorAll('nav[aria-label="Breadcrumb"] li, .breadcrumbs span, .breadcrumbs a').forEach(el => {
                if(el.innerHTML.includes('Narrativa') && el.nextElementSibling && el.nextElementSibling.innerHTML.includes('Narrativas')) {
                    el.style.display = 'none'; 
                    if(el.nextSibling && el.nextSibling.nodeType === 3) el.nextSibling.textContent = ''; 
                }
            });
        }, 500);

        // LIXEIRA: Clique e Confirmação
        document.body.addEventListener('click', function(e) {
            let deleteBtn = e.target.closest('.delete label') || e.target.closest('a.inline-deletelink');
            if (deleteBtn) {
                e.preventDefault(); 
                if(confirm('Tem certeza que deseja excluir esta opção permanentemente?')) {
                    let checkbox = deleteBtn.parentElement.querySelector('input[type="checkbox"]');
                    if(checkbox) checkbox.checked = true;
                    let djnItem = deleteBtn.closest('.djn-item');
                    if(djnItem) djnItem.style.display = 'none';
                }
            }
        });

        // Tabelas Clicáveis
        document.querySelectorAll('#changelist tbody tr').forEach(tr => {
            tr.addEventListener('click', function(e) {
                if(['a', 'input', 'button', 'svg', 'path', 'span'].includes(e.target.tagName.toLowerCase())) return;
                let link = this.querySelector('th a') || this.querySelector('td.field-titulo a');
                if(link) window.location.href = link.href;
            });
        });
    });
</script>
