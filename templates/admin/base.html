{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. BASE E FIM DO SCROLL
       ===================================================================== */
    body, html, .wrapper, .content-wrapper, .main-footer, #content-main {
        background-color: #111827 !important; color: #f3f4f6 !important; border: none !important; box-shadow: none !important; overflow-x: hidden !important;
    }
    .main-sidebar { background-color: #030712 !important; border: none !important; }
    nav.main-header, .breadcrumb, .brand-link { display: none !important; visibility: hidden !important; height: 0 !important; }
    .card, .card-body, .tab-content, .tab-pane { background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }

    /* =====================================================================
       2. CABEÇALHO E ABAS
       ===================================================================== */
    .content-header { height: 60px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #374151 !important; padding: 0 20px !important; margin: 0 0 20px 0 !important; }
    .content-header h1, .content-header .border-right, h1.border-right, .border-right { border-right: none !important; border: none !important; padding: 0 !important; margin: 0 !important; font-size: 1.6rem !important; font-weight: 800 !important; color: #ffffff !important; }

    .nav-tabs { border-bottom: 1px solid #4b5563 !important; margin-bottom: 20px !important;}
    .nav-tabs .nav-link { color: #9ca3af !important; font-weight: bold !important; font-size: 1rem !important; border: none !important; background: transparent !important; padding-left: 0 !important; padding-right: 20px !important;}
    .nav-tabs .nav-link.active { color: #14b8a6 !important; border-bottom: 3px solid #14b8a6 !important; }

    /* =====================================================================
       3. LIMPEZA DOS FORMULÁRIOS
       ===================================================================== */
    .inline-group > h2, .djn-group > h2, .inline-related h3, .djn-item h3, legend, .inline_label { display: none !important; visibility: hidden !important; height: 0 !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important;}
    .inline-group > fieldset, .djn-group > fieldset, fieldset.djn-fieldset, .inline-group, .djn-group { background: transparent !important; border: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; box-shadow: none !important; }

    #content-main > form > div > fieldset.module { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 25px !important; margin-bottom: 20px !important; width: 100% !important; box-sizing: border-box !important; }
    .inline-related, .djn-item { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; position: relative !important; padding: 20px !important; margin-bottom: 15px !important; width: 100% !important; box-sizing: border-box !important; }

    body .form-row, body .form-group { display: flex !important; flex-direction: column !important; width: 100% !important; max-width: 100% !important; margin: 0 0 15px 0 !important; padding: 0 !important; border: none !important; }
    body .form-row > div, body .form-group > div, body .fieldBox { width: 100% !important; max-width: 100% !important; display: block !important; }
    body label { color: #d1d5db !important; font-weight: 600 !important; font-size: 0.95rem !important; margin: 0 0 6px 0 !important; padding: 0 !important; display: block !important; width: 100% !important;}

    /* =====================================================================
       4. PADRONIZAÇÃO ABSOLUTA DE CORES DE INPUTS (NUNCA MAIS BRANCO)
       ===================================================================== */
    body input[type="text"], body input[type="number"], body input[type="email"], body input[type="password"], body textarea, body select {
        width: 100% !important; max-width: 100% !important;
        background-color: #374151 !important;
        color: #ffffff !important;
        border: 1px solid #4b5563 !important;
        border-radius: 6px !important;
        padding: 10px 15px !important;
        font-size: 1rem !important;
        box-sizing: border-box !important;
    }
    input:focus, textarea:focus, select:focus { border-color: #14b8a6 !important; outline: none !important; }
    input[type="file"] { background-color: transparent !important; border: none !important; padding: 5px 0 !important; color: #9ca3af !important; }
    input[type="checkbox"] { accent-color: #14b8a6 !important; width: 18px !important; height: 18px !important; cursor: pointer; }

    /* Doma o plugin Select2 para ficar escuro */
    select { height: 45px !important; appearance: auto !important; }
    .select2-container { width: 100% !important; display: block !important;}
    .select2-container--default .select2-selection--single, .select2-container--default .select2-selection--multiple { height: 45px !important; display: flex !important; align-items: center !important; background-color: #374151 !important; border: 1px solid #4b5563 !important; border-radius: 6px !important;}
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #ffffff !important; padding-left: 15px !important;}
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 43px !important; }
    .select2-dropdown { background-color: #1f2937 !important; border: 1px solid #4b5563 !important; }
    .select2-results__option { background-color: #1f2937 !important; color: #ffffff !important; }
    .select2-results__option[aria-selected="true"], .select2-results__option--highlighted { background-color: #14b8a6 !important; color: white !important; }
    .select2-search--dropdown .select2-search__field { background-color: #374151 !important; color: white !important; border: 1px solid #4b5563 !important; border-radius: 4px !important;}

    /* =====================================================================
       5. BOTÕES DE AÇÃO E SALVAR (MANTIDOS)
       ===================================================================== */
    .djn-group-nested { background-color: transparent !important; border: none !important; border-left: 3px solid #14b8a6 !important; padding: 0 0 0 15px !important; margin-top: 10px !important; width: 100% !important; box-sizing: border-box !important; }
    .djn-group-nested .djn-item { background: transparent !important; border: none !important; padding: 0 0 20px 0 !important; margin-bottom: 10px !important; border-bottom: 1px dashed #4b5563 !important; border-radius: 0 !important; box-shadow: none !important; }
    .djn-group-nested .djn-item:last-child { border-bottom: none !important; margin-bottom: 0 !important; padding-bottom: 0 !important;}

    span.delete, div.delete { position: absolute !important; top: 15px !important; right: 15px !important; z-index: 10 !important; display: block !important; }
    span.delete input, div.delete input { display: none !important; }
    span.delete label, div.delete label, a.inline-deletelink, a.djn-remove-handler { background-color: transparent !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; border-radius: 4px !important; padding: 6px 12px !important; font-size: 0 !important; font-weight: bold !important; text-transform: uppercase !important; cursor: pointer !important; transition: 0.2s; display: inline-block !important; margin: 0 !important; line-height: 1 !important; white-space: nowrap !important;}
    span.delete label::after, div.delete label::after { content: "Remover" !important; font-size: 0.75rem !important; }
    span.delete label:hover, div.delete label:hover, a.inline-deletelink:hover, a.djn-remove-handler:hover { background-color: #ef4444 !important; color: white !important; }

    .add-row, .djn-add-item { margin-top: 10px !important; padding: 0 !important; display: block !important; }
    .add-row a, .djn-add-item a, .djn-add-handler { background-color: transparent !important; color: #14b8a6 !important; border: 1px dashed #14b8a6 !important; padding: 8px 15px !important; border-radius: 6px !important; font-weight: 600 !important; font-size: 0.85rem !important; text-decoration: none !important; display: inline-block !important; transition: 0.2s; white-space: nowrap !important; }
    .add-row a:hover, .djn-add-item a:hover, .djn-add-handler:hover { background-color: #14b8a6 !important; color: white !important; }

    #change_form .col-md-3 .card, .submit-row { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 15px !important; box-shadow: none !important; }
    #change_form .col-md-3 .btn, .submit-row input, .submit-row a { width: 100% !important; margin-bottom: 10px !important; border-radius: 6px !important; font-weight: bold !important; text-align: center !important; }
    input[name="_save"], .btn-success { background-color: #14b8a6 !important; color: white !important; border: none !important; }
    input[name="_save"]:hover, .btn-success:hover { background-color: #0d9488 !important; }
    input[name="_addanother"], input[name="_continue"] { background-color: #374151 !important; color: white !important; border: 1px solid #4b5563 !important; }

    /* =====================================================================
       6. TABELAS MODERNAS NAS LISTAGENS
       ===================================================================== */
    #changelist table { width: 100% !important; background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; overflow: hidden !important; border-collapse: separate !important; border-spacing: 0 !important; margin-bottom: 0 !important; }
    #changelist table thead th { background-color: #111827 !important; color: #9ca3af !important; border-bottom: 2px solid #374151 !important; padding: 15px !important; font-weight: bold !important; text-transform: uppercase !important; font-size: 0.85rem !important; text-align: left !important;}
    #changelist table tbody td, #changelist table tbody th { padding: 15px !important; border-bottom: 1px solid #374151 !important; color: #f3f4f6 !important; vertical-align: middle !important; }
    #changelist table tbody tr:last-child td, #changelist table tbody tr:last-child th { border-bottom: none !important; }
    #changelist table tbody tr:hover { background-color: #374151 !important; }

    #changelist table td a { color: #14b8a6 !important; font-weight: 600 !important; text-decoration: none !important; }
    #changelist table td a:hover { color: #60a5fa !important; text-decoration: underline !important; }
    #changelist table td a[title="Relatório de Percurso"] { color: white !important; }

    .paginator { background-color: transparent !important; border: none !important; padding: 15px 0 !important; color: #d1d5db !important; text-align: left !important; margin-top: 10px !important;}
    .paginator a { color: #14b8a6 !important; padding: 5px 10px !important; text-decoration: none !important; font-weight: bold !important; }

    /* =====================================================================
       7. O FIM DA BAGUNÇA - BARRA DE FERRAMENTAS INFERIOR
       ===================================================================== */
    /* ESCONDE AS BARRAS ORIGINAIS DO JAZZMIN (Pesquisa, Ações e Adicionar do topo) */
    #toolbar, #changelist-search, .actions, .object-tools { display: none !important; }

    /* A NOSSA BARRA INFERIOR */
    .super-bottom-bar {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: wrap !important;
        justify-content: flex-end !important; /* Tudo alinhado à direita */
        align-items: center !important;
        gap: 15px !important; /* Espaçamento entre blocos */
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        border-radius: 8px !important;
        padding: 15px 20px !important;
        margin-top: 20px !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* Sub-grupos para alinhamento interno */
    .custom-group { display: flex !important; align-items: center !important; gap: 10px !important; margin: 0 !important; }

    /* Inputs e Selects limpos */
    .super-bottom-bar input[type="text"], .super-bottom-bar select {
        width: 250px !important;
        height: 42px !important;
        background-color: #374151 !important;
        border: 1px solid #4b5563 !important;
        color: white !important;
        border-radius: 6px !important;
        padding: 0 15px !important;
        box-sizing: border-box !important;
        margin: 0 !important;
    }
    .super-bottom-bar select {
        appearance: none !important; /* Remove seta feia nativa */
        cursor: pointer !important;
        background-image: url('data:image/svg+xml;utf8,<svg fill="%239ca3af" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') !important;
        background-repeat: no-repeat !important; background-position: right 10px center !important;
    }

    /* Botões Padrão da Barra */
    .custom-btn-primary, .custom-btn-secondary {
        height: 42px !important; padding: 0 20px !important; border-radius: 6px !important; font-weight: bold !important; cursor: pointer !important; display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; transition: 0.2s !important; white-space: nowrap !important; box-sizing: border-box !important; text-decoration: none !important; border: none !important; margin: 0 !important;
    }

    /* Verde: Pesquisar e Adicionar */
    .custom-btn-primary { background-color: #14b8a6 !important; color: white !important; }
    .custom-btn-primary:hover { background-color: #0d9488 !important; color: white !important; }

    /* Cinza: Botão Ir */
    .custom-btn-secondary { background-color: #4b5563 !important; color: white !important; }
    .custom-btn-secondary:hover { background-color: #6b7280 !important; color: white !important; }
</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    function construirBarraNoFundo() {
        // Evita duplicação se o Django recarregar via AJAX
        if (document.getElementById('super-bottom-bar')) return;

        const mainContent = document.getElementById('content-main');
        const formTabela = document.getElementById('changelist-form');

        // Se não existir a área principal, não fazemos nada (estamos noutra tela)
        if (!mainContent) return;

        // Garante que o form tem um ID para podermos linkar as ações
        if (formTabela && !formTabela.id) formTabela.id = 'changelist-form';

        const bar = document.createElement('div');
        bar.id = 'super-bottom-bar';
        bar.className = 'super-bottom-bar';

        // ==========================================
        // 1. PESQUISA
        // ==========================================
        const oldSearch = document.getElementById('changelist-search') || document.getElementById('toolbar');
        if (oldSearch) {
            const formSearch = oldSearch.querySelector('form');
            if (formSearch) {
                const sForm = document.createElement('form');
                sForm.action = formSearch.action;
                sForm.method = formSearch.method;
                sForm.className = 'custom-group';

                const input = formSearch.querySelector('input[type="text"]');
                if (input) {
                    const clone = input.cloneNode(true);
                    clone.placeholder = 'Pesquisar...';

                    // Mantém o texto pesquisado se houver
                    const urlParams = new URLSearchParams(window.location.search);
                    if(urlParams.has(clone.name)) clone.value = urlParams.get(clone.name);

                    sForm.appendChild(clone);
                }

                const btn = formSearch.querySelector('input[type="submit"], button');
                if (btn) {
                    const bClone = document.createElement('button');
                    bClone.type = 'submit';
                    bClone.className = 'custom-btn-primary';
                    bClone.innerHTML = '<i class="fas fa-search"></i> Pesquisar';
                    sForm.appendChild(bClone);
                }

                // Inputs escondidos vitais para o Django (filtros de datas, etc)
                formSearch.querySelectorAll('input[type="hidden"]').forEach(h => sForm.appendChild(h.cloneNode(true)));
                bar.appendChild(sForm);
            }
        }

        // ==========================================
        // 2. AÇÕES EM LOTE (Dropdown + Ir)
        // ==========================================
        const actions = document.querySelector('.actions');
        if (actions && formTabela) {
            const aWrap = document.createElement('div');
            aWrap.className = 'custom-group';

            const sel = actions.querySelector('select');
            if (sel) {
                const sClone = sel.cloneNode(true);
                sClone.removeAttribute('data-select2-id'); // Arranca o plugin que estraga o layout
                sClone.classList.remove('select2-hidden-accessible');
                sClone.setAttribute('form', formTabela.id); // Conecta o dropdown ao form da tabela
                aWrap.appendChild(sClone);

                const btn = actions.querySelector('button');
                if (btn) {
                    const bClone = document.createElement('button');
                    bClone.className = 'custom-btn-secondary';
                    bClone.innerText = 'Ir';

                    // Conecta o botão "Ir" ao form para submeter a ação
                    bClone.onclick = (e) => {
                        e.preventDefault();
                        let hidden = formTabela.querySelector('input[name="action"]');
                        if (!hidden) {
                            hidden = document.createElement('input');
                            hidden.type = 'hidden';
                            hidden.name = 'action';
                            formTabela.appendChild(hidden);
                        }
                        hidden.value = sClone.value;
                        formTabela.submit();
                    };
                    aWrap.appendChild(bClone);
                }
                bar.appendChild(aWrap);
            }
        }

        // ==========================================
        // 3. BOTÃO ADICIONAR
        // ==========================================
        const tools = document.querySelector('.object-tools');
        if (tools) {
            const tWrap = document.createElement('div');
            tWrap.className = 'custom-group';

            tools.querySelectorAll('a, button').forEach(t => {
                const c = t.cloneNode(true);
                c.className = 'custom-btn-primary';
                if (!c.innerHTML.includes('fa-')) {
                    c.innerHTML = `<i class="fas fa-plus"></i> ${c.innerText.trim()}`;
                }
                tWrap.appendChild(c);
            });
            bar.appendChild(tWrap);
        }

        // ==========================================
        // INSERE A BARRA NO FUNDO DA PÁGINA
        // ==========================================
        if (bar.children.length > 0) {
            mainContent.appendChild(bar);
        }
    }

    // Funcionalidades de limpeza para páginas de edição (Textos)
    function aplicarLimpezaGeral() {
        document.querySelectorAll('h2, h3, legend, .inline_label').forEach(el => {
            let t = el.innerText.toLowerCase();
            if (t.includes('pergunta') || t.includes('escolha') || t.includes('opcao') || t.includes('opção') || t.includes('erguntas') || t.includes('principal')) {
                el.style.setProperty('display', 'none', 'important');
            }
        });
        document.querySelectorAll('label').forEach(label => {
            if (label.innerText.trim() === 'Texto:') label.innerText = 'Opção:';
        });
    }

    window.addEventListener('load', function() {
        construirBarraNoFundo();
        aplicarLimpezaGeral();

        // Mantém a vigia caso o Django tente reconstruir a tela sozinho
        const observer = new MutationObserver(() => {
            construirBarraNoFundo();
            aplicarLimpezaGeral();
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Tira as barras de "|" do cabeçalho
        const h1 = document.querySelector('.content-header h1');
        if (h1) { h1.innerText = h1.innerText.replace(/\|/g, '').trim(); }
        document.querySelectorAll('.nav-link').forEach(function(el) { if (el.textContent.trim() === 'General') { el.textContent = 'Principal'; } });

        // Conta no Sidebar
        const sidebar = document.querySelector('ul.nav-sidebar') || document.querySelector('.os-content ul');
        if (sidebar && !document.querySelector('#menu-conta-custom')) {
            sidebar.insertAdjacentHTML('beforeend', `
                <li id="menu-conta-custom" class="nav-header" style="color: #6b7280; font-size: 0.75rem; text-transform: uppercase; padding: 10px 15px 5px; margin-top: 15px;">Conta</li>
                <li class="nav-item"><a href="/admin/password_change/" class="nav-link"><i class="nav-icon fas fa-key" style="color: #9ca3af;"></i><p style="color: #d1d5db;">Alterar Senha</p></a></li>
                <li class="nav-item"><a href="{% url 'narrativa:logout' %}" class="nav-link"><i class="nav-icon fas fa-sign-out-alt" style="color: #ef4444;"></i><p style="color: #ef4444; font-weight: bold;">Sair</p></a></li>
            `);
        }
    });
</script>
{% endblock %}

{% block messages %}
    {{ block.super }}
{% endblock %}
