{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. BASE E MODO ESCURO GERAL
       ===================================================================== */
    body, html, .wrapper, .content-wrapper, .main-footer, #content-main, .tab-content, .tab-pane {
        background-color: #111827 !important; color: #f3f4f6 !important; border: none !important; box-shadow: none !important;
        max-width: 100vw !important; overflow-x: hidden !important; box-sizing: border-box !important;
    }
    .main-sidebar { background-color: #030712 !important; padding-top: 0 !important; border: none !important; }

    nav.main-header, header.main-header, .main-header { display: none !important; height: 0 !important; padding: 0 !important; margin: 0 !important; visibility: hidden !important;}
    a.brand-link, .brand-link { display: none !important; height: 0 !important; padding: 0 !important; margin: 0 !important; visibility: hidden !important; }
    body.sidebar-mini .wrapper .content-wrapper { padding-top: 0 !important; margin-top: 0 !important; }

    /* Remove fundos de cartões principais e ZERA O ESPAÇO NO TOPO */
    .card, .card-body, .info-box, .bg-white, .tab-content, .tab-pane {
        background-color: transparent !important; border-color: transparent !important; color: #f3f4f6 !important; box-shadow: none !important; padding: 0 !important; margin-top: 0 !important; overflow-x: hidden !important;
    }

    .row, .form-row { margin-left: 0 !important; margin-right: 0 !important; width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; }

    /* =====================================================================
       2. TOPO LIMPO E ABAS
       ===================================================================== */
    .content-header { height: 70px !important; min-height: 70px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #374151 !important; padding: 0 20px !important; margin: 0 0 25px 0 !important; background-color: #111827 !important; }
    aside.main-sidebar .user-panel { height: 70px !important; min-height: 70px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #374151 !important; padding: 0 15px !important; margin: 0 0 25px 0 !important; border-top: none !important; }

    h1, .content-header h1, h1.border-right, .border-right {
        border-right: none !important; padding-right: 0 !important; margin-right: 0 !important; font-size: 1.8rem !important; font-weight: 800 !important; color: #ffffff !important;
    }
    .pr-3, .mr-3 { padding-right: 0 !important; margin-right: 0 !important; }
    .breadcrumb, .breadcrumb-item { display: none !important; }

    .nav-tabs { border-bottom: 1px solid #4b5563 !important; margin-bottom: 20px !important;}
    .nav-tabs .nav-link { color: #9ca3af !important; font-weight: bold !important; font-size: 1.05rem; border: none !important; background: transparent !important; border-bottom: 3px solid transparent !important; padding-left: 0 !important; padding-right: 20px !important;}
    .nav-tabs .nav-link:hover { color: #d1d5db !important; border-bottom: 3px solid #6b7280 !important; }
    .nav-tabs .nav-link.active, .nav-tabs .nav-item.show .nav-link { color: #14b8a6 !important; border-bottom: 3px solid #14b8a6 !important; }

    /* =====================================================================
       3. EXTINÇÃO DO TÍTULO CORTADO E CAIXOTES FANTASMAS
       ===================================================================== */
    .inline-group > h2, .djn-group > h2, h2.inline-heading, .tab-pane > h2,
    .inline-related h3, .djn-item h3, .inline-related .card-header, .djn-item .card-header,
    legend, .inline_label {
        display: none !important; visibility: hidden !important; opacity: 0 !important; height: 0 !important; margin: 0 !important; padding: 0 !important; position: absolute !important; overflow: hidden !important;
    }

    .inline-group > fieldset, .djn-group > fieldset,
    .inline-group > fieldset > .card-body, .djn-group > fieldset > .card-body,
    .card-outline, .inline-group, .djn-group {
        background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; box-sizing: border-box !important;
    }

    /* =====================================================================
       4. O CARTÃO PRINCIPAL E INPUTS
       ===================================================================== */
    .inline-related, .djn-item {
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        border-radius: 8px !important;
        position: relative !important;
        padding: 24px 24px 60px 24px !important;
        margin-bottom: 20px !important;
        width: 100% !important;
        box-sizing: border-box !important;
        overflow: hidden !important;
    }

    body .inline-related .form-row, body .djn-item .form-row {
        display: flex !important; flex-direction: column !important; margin: 0 0 15px 0 !important; padding: 0 !important; border: none !important; width: 100% !important; box-sizing: border-box !important;
    }

    body .inline-related label, body .djn-item label {
        color: #d1d5db !important; font-weight: 600 !important; font-size: 0.9rem !important; margin: 0 0 8px 0 !important; padding: 0 !important; width: 100% !important; text-align: left !important;
    }

    body .inline-related input, body .djn-item input,
    body .inline-related textarea, body .djn-item textarea,
    body .inline-related select, body .djn-item select,
    body .vTextField, body .vLargeTextField {
        width: 100% !important; max-width: 100% !important; background-color: #374151 !important; color: #ffffff !important; border: 1px solid #4b5563 !important; border-radius: 6px !important; padding: 10px 15px !important; box-sizing: border-box !important; font-size: 0.95rem !important;
    }
    body .inline-related input:focus, body .djn-item input:focus,
    body .inline-related textarea:focus, body .djn-item textarea:focus,
    body .inline-related select:focus, body .djn-item select:focus {
        border-color: #14b8a6 !important; outline: none !important;
    }
    body select:not([multiple]) { height: 42px !important; appearance: auto !important; }

    /* =====================================================================
       5. SUB-CARTÕES (Opções de Resposta)
       ===================================================================== */
    .djn-group-nested {
        background-color: transparent !important; border: none !important; border-left: 4px solid #14b8a6 !important; padding: 10px 0 10px 20px !important; margin-top: 15px !important; width: 100% !important; box-sizing: border-box !important;
    }
    .djn-group-nested > h2 {
        display: block !important; visibility: visible !important; height: auto !important; position: static !important; opacity: 1 !important; color: #9ca3af !important; background: transparent !important; border: none !important; padding: 0 0 10px 0 !important; margin: 0 0 15px 0 !important; font-size: 0.85rem !important; text-transform: uppercase; border-bottom: 1px solid #374151 !important;
    }
    .djn-group-nested .djn-item { background: transparent !important; border: none !important; padding: 0 0 40px 0 !important; margin-bottom: 10px !important; border-bottom: 1px dashed #374151 !important; border-radius: 0 !important; box-shadow: none !important; }
    .djn-group-nested .djn-item:last-child { border-bottom: none !important; }

    /* =====================================================================
       6. BOTÕES ADICIONAR E REMOVER
       ===================================================================== */
    .inline-deletelink, .djn-remove-handler, .delete {
        position: absolute !important; bottom: 15px !important; right: 15px !important; background-color: transparent !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; border-radius: 6px !important; padding: 6px 16px !important; font-size: 0.8rem !important; font-weight: bold !important; text-transform: uppercase !important; text-decoration: none !important; z-index: 10 !important; transition: 0.2s;
    }
    .inline-deletelink:hover, .djn-remove-handler:hover, .delete:hover { background-color: #ef4444 !important; color: white !important; }
    .delete label { font-size: 0 !important; margin-left: 5px !important; cursor: pointer;}
    .delete label::after { content: "Remover"; font-size: 0.8rem !important;}

    /* BOTOES ADICIONAR (Agora pequenos e alinhados à esquerda) */
    .add-row, .djn-add-item { margin-top: 15px !important; padding: 0 !important; background: transparent !important; border: none !important; text-align: left !important; }
    .add-row a, .djn-add-item a, .djn-add-handler {
        background-color: #14b8a6 !important; color: #ffffff !important; padding: 8px 20px !important; border-radius: 6px !important; font-weight: 700 !important; text-decoration: none !important; display: inline-block !important; width: auto !important; border: none !important; transition: 0.2s; box-sizing: border-box !important; font-size: 0.9rem !important;
    }
    .add-row a:hover, .djn-add-item a:hover, .djn-add-handler:hover { background-color: #0d9488 !important; }

    /* =====================================================================
       7. BARRA DE SALVAR (Submit Row) - ALINHADA À DIREITA
       ===================================================================== */
    .submit-row {
        display: flex !important;
        flex-direction: row !important;
        justify-content: flex-end !important; /* Manda tudo para a direita */
        align-items: center !important;
        gap: 10px !important;
        background: transparent !important;
        border: none !important;
        padding: 20px 0 !important;
        margin: 20px 0 0 0 !important;
        width: 100% !important;
    }
    /* Força os botões de Salvar a terem o tamanho exato do texto, não 100% */
    .submit-row input, .submit-row a, .submit-row button {
        width: auto !important;
        margin: 0 !important;
        display: inline-block !important;
        border-radius: 6px !important;
        padding: 10px 20px !important;
        font-weight: bold !important;
    }
    .submit-row input[type="submit"].default, .submit-row input[name="_save"] {
        background-color: #14b8a6 !important; color: white !important; border: none !important;
    }
    .submit-row input[type="submit"]:hover { background-color: #0d9488 !important; }
    .submit-row input[name="_addanother"], .submit-row input[name="_continue"] {
        background-color: #374151 !important; color: white !important; border: 1px solid #4b5563 !important;
    }

    /* Tela Login */
    body.login-page { background-color: #111827 !important; }
    .login-box, .register-box, .login-card-body { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 12px; }
</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    function aniquilarProblemasDoJazzmin() {
        document.querySelectorAll('h2, h3, legend, .inline_label').forEach(el => {
            let texto = el.innerText.toLowerCase();
            if (texto.includes('pergunta') || texto.includes('escolha') || texto.includes('opcao') || texto.includes('opção') || texto.includes('erguntas')) {
                el.style.setProperty('display', 'none', 'important');
            }
        });

        document.querySelectorAll('.row, .form-row').forEach(el => {
            el.style.setProperty('margin-left', '0', 'important');
            el.style.setProperty('margin-right', '0', 'important');
            el.style.setProperty('padding', '0', 'important');
            el.style.setProperty('display', 'flex', 'important');
            el.style.setProperty('flex-direction', 'column', 'important');
            el.style.setProperty('width', '100%', 'important');
        });

        document.querySelectorAll('fieldset.card, fieldset.card-outline, .inline-group > fieldset').forEach(el => {
            el.style.setProperty('background', 'transparent', 'important');
            el.style.setProperty('border', 'none', 'important');
            el.style.setProperty('box-shadow', 'none', 'important');
            el.style.setProperty('margin-top', '0', 'important');
        });
    }

    window.addEventListener('load', function() {
        aniquilarProblemasDoJazzmin();
        const observer = new MutationObserver(aniquilarProblemasDoJazzmin);
        observer.observe(document.body, { childList: true, subtree: true });

        const h1 = document.querySelector('.content-header h1');
        if (h1 && h1.innerHTML.includes('|')) { h1.innerHTML = h1.innerHTML.split('|')[0].trim(); }
        document.querySelectorAll('.nav-link').forEach(function(el) { if (el.textContent.trim() === 'General') { el.textContent = 'Principal'; } });

        const sidebar = document.querySelector('ul.nav-sidebar') || document.querySelector('.os-content ul');
        if (sidebar && !document.querySelector('#menu-conta-custom')) {
            sidebar.insertAdjacentHTML('beforeend', `
                <li id="menu-conta-custom" class="nav-header" style="color: #6b7280; font-size: 0.75rem; text-transform: uppercase; padding: 10px 15px 5px; margin-top: 15px;">Conta</li>
                <li class="nav-item"><a href="/admin/password_change/" class="nav-link"><i class="nav-icon fas fa-key" style="color: #9ca3af;"></i><p style="color: #d1d5db;">Alterar Senha</p></a></li>
                <li class="nav-item"><a href="{% url 'narrativa:logout' %}" class="nav-link"><i class="nav-icon fas fa-sign-out-alt" style="color: #ef4444;"></i><p style="color: #ef4444; font-weight: bold;">Sair</p></a></li>
            `);
        }
    });
</script>
{% endblock %}

{% block messages %}
    {{ block.super }}
{% endblock %}
