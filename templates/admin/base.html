{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. BASE E FIM DO SCROLL
       ===================================================================== */
    body, html, .wrapper, .content-wrapper, .main-footer, #content-main {
        background-color: #111827 !important; color: #f3f4f6 !important; border: none !important; box-shadow: none !important; overflow-x: hidden !important;
    }
    .main-sidebar { background-color: #030712 !important; border: none !important; }
    nav.main-header, .breadcrumb { display: none !important; }

    .card, .card-body, .tab-content, .tab-pane {
        background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important;
    }

    /* =====================================================================
       2. CABEÇALHO E ABAS
       ===================================================================== */
    .content-header { height: 60px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #374151 !important; padding: 0 20px !important; margin: 0 0 20px 0 !important; }
    .content-header h1, .content-header .border-right, h1.border-right, .border-right { border-right: none !important; border: none !important; padding: 0 !important; margin: 0 !important; font-size: 1.6rem !important; font-weight: 800 !important; color: #ffffff !important; }

    .nav-tabs { border-bottom: 1px solid #4b5563 !important; margin-bottom: 20px !important;}
    .nav-tabs .nav-link { color: #9ca3af !important; font-weight: bold !important; font-size: 1rem !important; border: none !important; background: transparent !important; padding-left: 0 !important; padding-right: 20px !important;}
    .nav-tabs .nav-link.active { color: #14b8a6 !important; border-bottom: 3px solid #14b8a6 !important; }

    /* =====================================================================
       3. PADRÃO DOS CARTÕES (PRINCIPAL E INLINES FICAM IGUAIS)
       ===================================================================== */
    .inline-group > h2, .djn-group > h2, .inline-related h3, .djn-item h3, legend, .inline_label { display: none !important; }
    .inline-group > fieldset, .djn-group > fieldset, .inline-group, .djn-group { background: transparent !important; border: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }

    fieldset.module, .inline-related, .djn-item {
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        border-radius: 8px !important;
        position: relative !important;
        padding: 25px !important;
        margin-bottom: 20px !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    body .form-row { display: flex !important; flex-direction: column !important; width: 100% !important; max-width: 100% !important; margin: 0 0 15px 0 !important; padding: 0 !important; border: none !important; }
    body .form-row > div { width: 100% !important; max-width: 100% !important; }
    body label { color: #d1d5db !important; font-weight: 600 !important; font-size: 0.95rem !important; margin: 0 0 6px 0 !important; padding: 0 !important; display: block !important; }

    /* Inputs */
    input[type="text"], input[type="number"], textarea, select, .vTextField {
        width: 100% !important; max-width: 100% !important; background-color: #374151 !important; color: #ffffff !important; border: 1px solid #4b5563 !important; border-radius: 6px !important; padding: 12px 15px !important; font-size: 1rem !important; box-sizing: border-box !important;
    }
    input:focus, textarea:focus, select:focus { border-color: #14b8a6 !important; outline: none !important; }

    select { height: 45px !important; appearance: auto !important; }
    .select2-container { width: 100% !important; }
    .select2-container--default .select2-selection--single { height: 45px !important; display: flex !important; align-items: center !important; background-color: #374151 !important; border: 1px solid #4b5563 !important; border-radius: 6px !important;}
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #ffffff !important; padding-left: 15px !important;}
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 43px !important; }

    /* =====================================================================
       4. SUB-CARTÕES (Opções de Resposta)
       ===================================================================== */
    .djn-group-nested { background-color: transparent !important; border: none !important; border-left: 3px solid #14b8a6 !important; padding: 0 0 0 15px !important; margin-top: 15px !important; width: 100% !important; box-sizing: border-box !important; }
    .djn-group-nested .djn-item { background: transparent !important; border: none !important; padding: 25px 0 10px 0 !important; margin-bottom: 10px !important; border-bottom: 1px dashed #4b5563 !important; border-radius: 0 !important; box-shadow: none !important; }
    .djn-group-nested .djn-item:last-child { border-bottom: none !important; margin-bottom: 0 !important; }

    /* =====================================================================
       5. SOLUÇÃO DEFINITIVA DO "REMOVERREMOVER"
       ===================================================================== */
    /* Aniquila completamente a caixinha e a label nativa do Django */
    span.delete, div.delete { display: none !important; }

    /* Estiliza APENAS o link do plugin Nested Admin e o coloca no TOPO DIREITO */
    a.inline-deletelink, a.djn-remove-handler {
        position: absolute !important; top: 10px !important; right: 15px !important; background-color: transparent !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; border-radius: 4px !important; padding: 4px 10px !important; font-size: 0.75rem !important; font-weight: bold !important; text-transform: uppercase !important; text-decoration: none !important; z-index: 10 !important; transition: 0.2s; display: inline-block !important;
    }
    a.inline-deletelink:hover, a.djn-remove-handler:hover { background-color: #ef4444 !important; color: white !important; }

    /* =====================================================================
       6. BOTÕES ADICIONAR E PAINEL DE SALVAR
       ===================================================================== */
    .add-row, .djn-add-item { margin-top: 10px !important; padding: 0 !important; display: block !important; }
    .add-row a, .djn-add-item a, .djn-add-handler {
        background-color: transparent !important; color: #14b8a6 !important; border: 1px dashed #14b8a6 !important; padding: 8px 15px !important; border-radius: 6px !important; font-weight: 600 !important; font-size: 0.9rem !important; text-decoration: none !important; display: inline-block !important; transition: 0.2s;
    }
    .add-row a:hover, .djn-add-item a:hover, .djn-add-handler:hover { background-color: #14b8a6 !important; color: white !important; }

    #change_form .col-md-3 .card, .submit-row { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 15px !important; box-shadow: none !important; }
    #change_form .col-md-3 .btn, .submit-row input, .submit-row a { width: 100% !important; margin-bottom: 10px !important; border-radius: 6px !important; font-weight: bold !important; text-align: center !important; }
    input[name="_save"], .btn-success { background-color: #14b8a6 !important; color: white !important; border: none !important; }
    input[name="_addanother"], input[name="_continue"] { background-color: #374151 !important; color: white !important; border: 1px solid #4b5563 !important; }
</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    function aplicarLimpeza() {
        document.querySelectorAll('h2, h3, legend, .inline_label').forEach(el => {
            let t = el.innerText.toLowerCase();
            if (t.includes('pergunta') || t.includes('escolha') || t.includes('opcao') || t.includes('opção') || t.includes('erguntas') || t.includes('principal')) {
                el.style.setProperty('display', 'none', 'important');
            }
        });
        document.querySelectorAll('label').forEach(label => {
            if (label.innerText.trim() === 'Texto:') label.innerText = 'Opção:';
        });
    }

    window.addEventListener('load', function() {
        aplicarLimpeza();
        const observer = new MutationObserver(aplicarLimpeza);
        observer.observe(document.body, { childList: true, subtree: true });

        const h1 = document.querySelector('.content-header h1');
        if (h1) { h1.innerText = h1.innerText.replace(/\|/g, '').trim(); }

        document.querySelectorAll('.nav-link').forEach(function(el) { if (el.textContent.trim() === 'General') { el.textContent = 'Principal'; } });
    });
</script>
{% endblock %}
