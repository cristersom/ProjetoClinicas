{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}

<link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<meta name="description" content="Narrativas clínicas e pesquisas de satisfação, tudo em um só lugar.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script>
    function limparTextosInuteis() {
        document.querySelectorAll('option').forEach(opt => {
            if(opt.textContent.trim() === '---------' || opt.textContent.trim() === '---') opt.textContent = 'Selecione...';
        });
        document.querySelectorAll('.select2-selection__rendered').forEach(el => {
            if(el.textContent.trim() === '---------' || el.title === '---------') { el.textContent = 'Selecione...'; el.title = 'Selecione...'; }
        });

        document.querySelectorAll('#changelist table tbody td').forEach(td => {
            let texto = td.innerText.trim();
            if(texto === '-' || texto === '—' || texto === 'None') td.innerHTML = '';
        });
    }

    function formatarTabelasMobile() {
        if(window.innerWidth <= 768) {
            const tables = document.querySelectorAll('#changelist table');
            tables.forEach(table => {
                const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.innerText.trim());
                table.querySelectorAll('tbody tr').forEach(tr => {
                    let actionsDiv = tr.querySelector('.mobile-actions-container');
                    if (!actionsDiv) {
                        actionsDiv = document.createElement('div');
                        actionsDiv.className = 'mobile-actions-container';
                        tr.appendChild(actionsDiv);
                    }

                    Array.from(tr.querySelectorAll('td, th')).forEach((td, index) => {
                        let headerText = headers[index] || '';

                        if (td.querySelector('a') && (headerText.toLowerCase().includes('ação') || headerText.toLowerCase().includes('relatório') || headerText === '')) {
                            let links = td.querySelectorAll('a');
                            links.forEach(l => {
                                let text = l.innerText.toLowerCase();
                                l.className = 'btn-table-icon';

                                if(text.includes('relatório') || text.includes('resumo')) {
                                    l.innerHTML = '<i class="fas fa-chart-line"></i>'; l.classList.add('btn-info');
                                } else if(text.includes('detalhes')) {
                                    l.innerHTML = '<i class="fas fa-list"></i>'; l.classList.add('btn-primary');
                                } else if(text.includes('excluir') || text.includes('remover') || l.classList.contains('deletelink') || headerText.toLowerCase().includes('ação')) {
                                    l.innerHTML = '<i class="fas fa-trash"></i>'; l.classList.add('btn-danger');
                                }
                                actionsDiv.appendChild(l);
                            });
                            td.style.display = 'none';
                        } else {
                            if (!td.hasAttribute('data-label')) {
                                if (td.querySelector('.action-checkbox')) headerText = 'Selecionar';
                                td.setAttribute('data-label', headerText);
                            }
                            if (td.innerHTML.trim() === '' && !td.querySelector('input')) td.style.display = 'none';
                        }
                    });
                });
            });
        }
    }

    function construirBarrasInferiores() {
        if (document.getElementById('custom-search-container')) return;
        const changelist = document.getElementById('changelist');
        if (!changelist) return;

        // --- BARRA DE PESQUISA (Input e Lupa na mesma linha) ---
        const searchInputOrig = document.querySelector('#changelist-search input[name="q"]');
        const searchFormOrig = document.querySelector('#changelist-search form');

        if (searchInputOrig && searchFormOrig) {
            const searchContainer = document.createElement('div');
            searchContainer.id = 'custom-search-container';
            searchContainer.className = 'inline-action-bar search-bar-container';

            const searchGroup = document.createElement('form');
            searchGroup.className = 'my-group search-group';
            searchGroup.action = searchFormOrig.action;
            searchGroup.method = searchFormOrig.method || 'GET';

            const cloneInput = searchInputOrig.cloneNode(true);
            cloneInput.className = 'custom-input';
            if(!cloneInput.placeholder) cloneInput.placeholder = 'Pesquisar...';

            const btnSearch = document.createElement('button');
            btnSearch.type = 'submit';
            btnSearch.className = 'custom-btn btn-pesquisar';
            btnSearch.innerHTML = '<i class="fas fa-search"></i>';

            searchGroup.appendChild(cloneInput);
            searchGroup.appendChild(btnSearch);
            searchFormOrig.querySelectorAll('input[type="hidden"]').forEach(h => searchGroup.appendChild(h.cloneNode(true)));

            searchContainer.appendChild(searchGroup);
            changelist.insertBefore(searchContainer, document.querySelector('#changelist-form'));
            document.querySelector('#changelist-search').style.setProperty('display', 'none', 'important');
        }

        // --- BARRA DE AÇÕES EM MASSA ---
        const actionSelectOrig = document.querySelector('select[name="action"]');
        const btnIrOrig = document.querySelector('.actions button[type="submit"], .actions input[type="submit"]');

        if (actionSelectOrig && btnIrOrig) {
            const actionContainer = document.createElement('div');
            actionContainer.id = 'custom-actions-container';
            actionContainer.className = 'inline-action-bar';

            const actionGroup = document.createElement('div');
            actionGroup.className = 'my-group actions-group';

            const selClone = actionSelectOrig.cloneNode(true);
            selClone.className = 'custom-select';
            selClone.removeAttribute('data-select2-id');
            selClone.classList.remove('select2-hidden-accessible');
            if(selClone.options[0] && selClone.options[0].text.includes('---')) {
                selClone.options[0].text = 'Ações em massa...';
            }

            const btnIr = document.createElement('button');
            btnIr.className = 'custom-btn btn-ir';
            btnIr.innerHTML = 'Ir';
            btnIr.onclick = (e) => {
                e.preventDefault();
                actionSelectOrig.value = selClone.value;
                btnIrOrig.click();
            };

            actionGroup.appendChild(selClone);
            actionGroup.appendChild(btnIr);
            actionContainer.appendChild(actionGroup);

            const paginator = document.querySelector('.paginator');
            if (paginator) { paginator.parentNode.insertBefore(actionContainer, paginator); }
            else { changelist.appendChild(actionContainer); }

            const origContainer = actionSelectOrig.closest('.actions');
            if (origContainer) origContainer.style.setProperty('display', 'none', 'important');
        }
    }

    function aplicarUXeBotoes() {
        // Remover legendas que poluem a tela
        document.querySelectorAll('legend, .inline_label').forEach(el => {
            let t = el.innerText.toLowerCase();
            if (t.includes('pergunta') || t.includes('escolha') || t.includes('opcao') || t.includes('opção') || t.includes('principal')) {
                el.style.setProperty('display', 'none', 'important');
            }
        });

        // Formatar botões do Topo com Texto + Ícone, mantendo GAP
        document.querySelectorAll('.object-tools a, .page-actions a').forEach(btn => {
            let text = btn.innerText.toLowerCase();
            if(!btn.classList.contains('custom-btn-top')) {
                btn.className = 'custom-btn-top';
                if (text.includes('adicionar')) { btn.innerHTML = `<i class="fas fa-plus"></i> ${btn.innerText.trim()}`; }
                else if (text.includes('importar')) { btn.innerHTML = `<i class="fas fa-file-import"></i> ${btn.innerText.trim()}`; }
                else if (text.includes('exportar')) { btn.innerHTML = `<i class="fas fa-file-export"></i> ${btn.innerText.trim()}`; }
            }
        });

        // Pegar botão histórico/engrenagem e descer para a área de Salvar
        document.querySelectorAll('.object-tools a, .historylink, a[href$="/history/"]').forEach(btn => {
            let text = btn.innerText.toLowerCase();
            if (text.includes('histórico') || text.includes('history') || btn.innerHTML.includes('fa-cog') || btn.classList.contains('historylink')) {
                btn.className = 'custom-btn-bottom btn-history';
                btn.innerHTML = '<i class="fas fa-history"></i> Histórico';
                const submitRow = document.querySelector('.submit-row') || document.getElementById('jazzy-actions');
                if (submitRow && !submitRow.contains(btn)) {
                    submitRow.appendChild(btn);
                }
            }
        });

        // Confirm Action para Lixeiras Inlines
        document.querySelectorAll('span.delete label, a.inline-deletelink').forEach(lbl => {
            if(!lbl.classList.contains('js-bound')) {
                lbl.classList.add('js-bound');
                lbl.addEventListener('click', function(e) {
                    if(!confirm('Tem certeza que deseja remover este item?')) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                    // Ocultar a caixa imediatamente após a confirmação para melhorar UX
                    let inlineCard = this.closest('.inline-related') || this.closest('.djn-item');
                    if(inlineCard) inlineCard.style.display = 'none';
                });
            }
        });
    }

    window.addEventListener('DOMContentLoaded', function() {
        aplicarUXeBotoes();
        construirBarrasInferiores();
        limparTextosInuteis();
        formatarTabelasMobile();

        // Morte à borda fantasma nos títulos
        const h1 = document.querySelector('.content-header h1');
        if (h1) {
            h1.childNodes.forEach(node => {
                if (node.nodeType === 3) node.nodeValue = node.nodeValue.replace(/\|/g, '').trim();
            });
        }

        // Dashboard título forçado se necessário para alinhar
        if(window.location.pathname === '/admin/' && !document.querySelector('.content-header')) {
            const wrapper = document.querySelector('.content-wrapper');
            if(wrapper) {
                const fakeHeader = document.createElement('div');
                fakeHeader.className = 'content-header';
                fakeHeader.innerHTML = '<h1>Dashboard</h1>';
                wrapper.insertBefore(fakeHeader, wrapper.firstChild);
            }
        }
    });

    window.addEventListener('resize', formatarTabelasMobile);
</script>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. BASE E TEMA ESCURO
       ===================================================================== */
    *, *::before, *::after { box-sizing: border-box !important; }
    body, html, .wrapper, .content-wrapper, .main-footer, #content-main { background-color: #111827 !important; color: #f3f4f6 !important; border: none !important; box-shadow: none !important; max-width: 100vw !important; overflow-x: hidden !important; }
    .main-sidebar { background-color: #030712 !important; border: none !important; }
    .os-scrollbar { display: none !important; visibility: hidden !important; }
    .p-5, .card-body.p-5 { padding: 0 !important; }
    .card, .card-body, .tab-content, .tab-pane { background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
    #change_form .tab-content > .card, #change_form .tab-pane > .card { border: none !important; background-color: transparent !important; }

    /* =====================================================================
       2. TÍTULOS E ALINHAMENTO DESKTOP (A Regra dos 65px)
       ===================================================================== */
    .brand-link, .navbar-nav.ml-auto { display: none !important; }

    /* Box do Email */
    .user-panel {
        border-top: none !important; border-bottom: 1px solid #374151 !important;
        height: 65px !important; display: flex !important; align-items: center !important; justify-content: flex-start !important;
        padding: 0 20px !important; margin: 0 !important;
    }
    .user-panel .image, .user-panel img, .user-panel i, .user-block .image { display: none !important; }
    .user-panel .info { width: 100% !important; text-align: left !important; padding: 0 !important; display: block !important;}
    .user-panel .info a { display: block !important; font-weight: bold !important; color: #d1d5db !important; }

    /* Box do Título (Perfeitamente alinhado com o Email) */
    .content-header {
        height: 65px !important; min-height: 65px !important; display: flex !important; align-items: center !important; justify-content: space-between !important;
        border-bottom: 1px solid #374151 !important; padding: 0 20px !important; margin: 0 0 20px 0 !important;
        border-right: none !important; border-left: none !important; box-sizing: border-box !important;
    }
    .content-header h1, h1.border-right, .border-right {
        border: none !important; padding: 0 !important; margin: 0 !important; font-size: 1.6rem !important; font-weight: 800 !important; color: #ffffff !important; box-shadow: none !important;
    }

    /* =====================================================================
       3. BOTÕES DO TOPO (Espaçados e Alinhados)
       ===================================================================== */
    ul.object-tools, .page-actions { display: flex !important; flex-direction: row !important; align-items: center !important; gap: 15px !important; margin: 0 !important; padding: 0 !important; list-style: none !important; margin-left: 15px !important;}
    ul.object-tools li, .page-actions li { margin: 0 !important; }
    .custom-btn-top {
        display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important;
        height: 42px !important; padding: 0 20px !important; border-radius: 8px !important;
        background-color: #14b8a6 !important; color: white !important; font-size: 1rem !important; font-weight: bold !important; border: none !important; text-decoration: none !important; transition: 0.2s; white-space: nowrap !important;
    }
    .custom-btn-top:hover { background-color: #0d9488 !important; color: white !important;}

    /* =====================================================================
       4. PESQUISA COM LUPA E AÇÕES (MESMA LINHA E SEM BOXES)
       ===================================================================== */
    .inline-action-bar { display: block !important; width: 100% !important; margin-bottom: 20px !important; }

    .my-group.search-group { display: flex !important; flex-direction: row !important; align-items: center !important; gap: 10px !important; width: 100% !important; }
    .my-group.search-group .custom-input { flex: 1 !important; height: 45px !important; background-color: #374151 !important; border: 1px solid #4b5563 !important; color: white !important; border-radius: 8px !important; padding: 0 15px !important; }
    .my-group.search-group .btn-pesquisar { width: 50px !important; height: 45px !important; border-radius: 8px !important; background-color: #6b21a8 !important; color: white !important; display: flex !important; align-items: center !important; justify-content: center !important; border: none !important; cursor: pointer !important; flex-shrink: 0 !important; font-size: 1.2rem !important;}

    .my-group.actions-group { display: flex !important; flex-direction: row !important; align-items: center !important; gap: 10px !important; width: 100% !important;}
    .my-group.actions-group .custom-select { flex: 1 !important; height: 45px !important; background-color: #374151 !important; border: 1px solid #4b5563 !important; color: white !important; border-radius: 8px !important; padding: 0 15px !important; }
    .my-group.actions-group .btn-ir { width: 80px !important; height: 45px !important; border-radius: 8px !important; background-color: #3b82f6 !important; color: white !important; font-weight: bold !important; display: flex !important; align-items: center !important; justify-content: center !important; border: none !important; cursor: pointer !important; flex-shrink: 0 !important;}

    /* =====================================================================
       5. FORMULÁRIOS, INPUTS E LIXEIRAS PERFEITAS
       ===================================================================== */
    fieldset.module { background-color: transparent !important; border: none !important; padding: 0 !important; margin-bottom: 20px !important; }
    .related-widget-wrapper-link { display: none !important; } /* Lápis e olho do Django */
    .datetimeshortcuts { display: none !important; } /* Adeus Hoje | Agora */

    .inline-related, .djn-item { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 12px !important; padding: 25px 20px 20px 20px !important; margin-bottom: 20px !important; position: relative !important; }
    .djn-group-nested .inline-related { background-color: #111827 !important; border: 1px dashed #4b5563 !important; margin-top: 15px !important;}
    .inline-related .field-narrativa { display: none !important; }

    /* A MÁGICA DA LIXEIRA: Botão na Direita, Checkbox Oculta */
    span.delete input[type="checkbox"], div.delete input[type="checkbox"] { display: none !important; }
    span.delete, div.delete, a.inline-deletelink, a.djn-remove-handler { position: absolute !important; top: 15px !important; right: 15px !important; display: block !important; margin: 0 !important; z-index: 10; }
    span.delete label, div.delete label, a.inline-deletelink, a.djn-remove-handler {
        background-color: #ef4444 !important; color: white !important; width: 40px !important; height: 40px !important; border-radius: 8px !important;
        display: flex !important; align-items: center !important; justify-content: center !important; font-size: 0 !important; border: none !important; cursor: pointer !important; padding: 0 !important; margin: 0 !important; transition: 0.2s;
    }
    span.delete label::after, div.delete label::after, a.inline-deletelink::after, a.djn-remove-handler::after { content: "\f2ed" !important; font-family: "Font Awesome 5 Free" !important; font-weight: 900 !important; font-size: 1.2rem !important; }
    span.delete label:hover, a.inline-deletelink:hover { background-color: #dc2626 !important; transform: scale(1.05); }

    /* Estrutura dos Inputs alinhada à esquerda */
    .form-row, .form-group { display: flex !important; flex-direction: column !important; align-items: flex-start !important; width: 100% !important; margin: 0 0 15px 0 !important;}
    .form-row > div, .form-group > div, .fieldBox { width: 100% !important; max-width: 100% !important; padding: 0 !important;}
    body label { color: #d1d5db !important; font-weight: 600 !important; font-size: 0.95rem !important; margin: 0 0 6px 0 !important; display: block !important; width: 100% !important; text-align: left !important;}

    input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea, select {
        width: 100% !important; max-width: 100% !important; background-color: #374151 !important; color: #ffffff !important; border: 1px solid #4b5563 !important; border-radius: 8px !important; padding: 10px 15px !important; box-sizing: border-box !important; height: 45px !important; font-size: 1rem !important;
    }
    textarea { height: auto !important; min-height: 100px !important; }
    input:focus, textarea:focus, select:focus { border-color: #14b8a6 !important; outline: none !important; }
    .select2-container { width: 100% !important; max-width: 100% !important; }
    .select2-selection { background-color: #374151 !important; border: 1px solid #4b5563 !important; border-radius: 8px !important; display: flex !important; align-items: center !important; height: 45px !important;}
    .select2-selection__rendered { color: #ffffff !important; }

    /* Botão Adicionar Outro */
    .add-row, .djn-add-item { margin: 15px 0 !important; width: 100% !important; display: block !important; }
    .add-row a, .djn-add-item a, .djn-add-handler { display: block !important; width: 100% !important; text-align: center !important; padding: 15px !important; font-size: 1rem !important; border: 2px dashed #14b8a6 !important; color: #14b8a6 !important; font-weight: bold !important; border-radius: 8px !important; background-color: rgba(20, 184, 166, 0.05) !important; }

    /* =====================================================================
       6. BOTÕES DE SALVAR E HISTÓRICO NO FUNDO
       ===================================================================== */
    .submit-row, #jazzy-actions { display: flex !important; flex-direction: column !important; gap: 15px !important; padding: 20px !important; margin-top: 30px !important; background: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important;}
    .custom-btn-bottom, .submit-row input, .submit-row a, #jazzy-actions .btn {
        width: 100% !important; display: block !important; padding: 15px !important; font-size: 1.1rem !important; font-weight: bold !important; text-align: center !important; border-radius: 8px !important; border: none !important; color: white !important; cursor: pointer; text-decoration: none !important; margin: 0 !important;
    }
    input[name="_save"] { background-color: #14b8a6 !important; }
    input[name="_addanother"], .btn-info { background-color: #3b82f6 !important; }
    input[name="_continue"] { background-color: #8b5cf6 !important; }
    .btn-history { background-color: #4b5563 !important; }
    #change_form .col-md-3 { display: none !important; }

    /* =====================================================================
       7. TABELAS DESKTOP
       ===================================================================== */
    @media (min-width: 769px) {
        body nav.main-header { display: none !important; }

        #changelist table { width: 100% !important; background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; overflow: hidden !important; border-collapse: separate !important;}
        #changelist table th { background-color: #111827 !important; color: #9ca3af !important; border-bottom: 2px solid #374151 !important; padding: 15px !important; }
        #changelist table td { padding: 15px !important; border-bottom: 1px solid #374151 !important; color: #f3f4f6 !important; }

        .my-group.search-group, .my-group.actions-group { max-width: 500px !important; margin-bottom: 30px !important;}

        .submit-row { flex-direction: row !important; justify-content: flex-end !important; }
        .custom-btn-bottom, .submit-row input, .submit-row a, #jazzy-actions .btn { width: auto !important; padding: 12px 25px !important; }
    }

    /* =====================================================================
       8. MOBILE PERFEITO (Card View e Alinhamentos)
       ===================================================================== */
    @media (max-width: 768px) {
        #content-main, .content-wrapper, .container-fluid, .content { padding: 15px 10px 40px 10px !important; } /* 40px padding bottom extra p/ os botoes de salvar */
        body nav.main-header { display: flex !important; min-height: 55px !important; background-color: #1f2937 !important; border-bottom: 1px solid #374151 !important; }
        body nav.main-header .nav-link i.fa-bars { color: #14b8a6 !important; font-size: 1.5rem !important; opacity: 1 !important;}
        .breadcrumb { display: none !important; }

        .user-panel { justify-content: flex-start !important; padding-left: 20px !important; height: 60px !important;}

        /* Título e Botões na mesma linha no Mobile */
        .content-header { height: auto !important; padding: 0 5px !important; margin: 0 0 20px 0 !important; border: none !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important;}
        .content-header h1 { font-size: 1.5rem !important; flex: 1 !important;}
        ul.object-tools { flex-wrap: wrap !important; justify-content: flex-end !important; margin-left: auto !important;}

        /* CARD VIEW MOBILE (Sem linhas feias, sem títulos escuros) */
        #changelist table { display: block !important; width: 100% !important; border: none !important; background: transparent !important;}
        #changelist table thead { display: none !important; }
        #changelist table tbody { display: block !important; width: 100% !important; }
        #changelist table tbody tr { display: flex !important; flex-direction: column !important; width: 100% !important; margin-bottom: 15px !important; background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 12px !important; padding: 15px !important; }

        /* O segredo da limpeza visual: Sem borders nas TDs */
        #changelist table tbody td, #changelist table tbody th { display: flex !important; flex-direction: column !important; padding: 5px 0 15px 0 !important; border-bottom: none !important; width: 100% !important; align-items: flex-start !important; background: transparent !important; }

        #changelist table tbody td::before, #changelist table tbody th::before {
            content: attr(data-label) !important; font-weight: bold !important; color: #9ca3af !important; font-size: 0.75rem !important; text-transform: uppercase !important; margin-bottom: 5px !important; display: block !important; background: transparent !important; padding: 0 !important; border: none !important;
        }

        .mobile-actions-container { display: flex !important; flex-direction: row !important; gap: 10px !important; width: 100% !important; justify-content: flex-end !important; margin-top: 5px !important; padding-top: 15px !important; border-top: 1px solid #374151 !important;}
        .btn-table-icon { display: inline-flex !important; align-items: center !important; justify-content: center !important; width: 45px !important; height: 45px !important; border-radius: 8px !important; color: white !important; font-size: 1.2rem !important; text-decoration: none !important;}

        .submit-row { background: transparent !important; border: none !important; padding: 0 !important; margin-top: 20px !important;}
    }
</style>
{% endblock %}
