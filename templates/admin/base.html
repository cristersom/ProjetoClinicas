{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. BASE, FUNDO E FIM DO SCROLL HORIZONTAL
       ===================================================================== */
    body, html, .wrapper, .content-wrapper, .main-footer, #content-main {
        background-color: #111827 !important; color: #f3f4f6 !important; border: none !important; box-shadow: none !important;
        overflow-x: hidden !important;
    }
    .main-sidebar { background-color: #030712 !important; border: none !important; }

    /* Oculta topo padrão do Django/Jazzmin que não usamos */
    nav.main-header, .breadcrumb { display: none !important; }

    /* Remove fundos brancos residuais */
    .card, .card-body, .tab-content, .tab-pane {
        background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important;
    }

    /* =====================================================================
       2. CABEÇALHO DA PÁGINA (H1) E ABAS
       ===================================================================== */
    .content-header {
        height: 70px !important; display: flex !important; align-items: center !important;
        border-bottom: 1px solid #374151 !important; padding: 0 20px !important; margin: 0 0 20px 0 !important;
    }
    .content-header h1 {
        border-right: none !important; padding: 0 !important; margin: 0 !important;
        font-size: 1.8rem !important; font-weight: 800 !important; color: #ffffff !important;
    }

    .nav-tabs { border-bottom: 1px solid #4b5563 !important; margin-bottom: 25px !important;}
    .nav-tabs .nav-link { color: #9ca3af !important; font-weight: bold !important; font-size: 1.05rem; border: none !important; background: transparent !important; padding-left: 0 !important; padding-right: 20px !important;}
    .nav-tabs .nav-link:hover { color: #d1d5db !important; border-bottom: 3px solid #6b7280 !important; }
    .nav-tabs .nav-link.active { color: #14b8a6 !important; border-bottom: 3px solid #14b8a6 !important; }

    /* =====================================================================
       3. LIMPEZA DOS INLINES (Esconde lixo do Nested Admin)
       ===================================================================== */
    .inline-group > h2, .djn-group > h2, .inline-related h3, .djn-item h3, legend, .inline_label {
        display: none !important; visibility: hidden !important; height: 0 !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important;
    }

    .inline-group > fieldset, .djn-group > fieldset, .inline-group, .djn-group {
        background: transparent !important; border: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important;
    }

    /* =====================================================================
       4. O CARTÃO PRINCIPAL E INPUTS (Agora sim, 100% Width!)
       ===================================================================== */
    .inline-related, .djn-item {
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        border-radius: 10px !important;
        position: relative !important;
        padding: 25px 25px 70px 25px !important; /* Espaço inferior para o botão remover */
        margin-bottom: 20px !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* O Segredo: Forçar a coluna e os divs internos a terem 100% */
    body .inline-related .form-row, body .djn-item .form-row {
        display: flex !important; flex-direction: column !important; width: 100% !important; max-width: 100% !important; margin: 0 0 15px 0 !important; padding: 0 !important; border: none !important;
    }
    body .inline-related .form-row > div, body .djn-item .form-row > div {
        width: 100% !important; max-width: 100% !important; flex: 1 1 100% !important;
    }

    body .inline-related label, body .djn-item label {
        color: #d1d5db !important; font-weight: 600 !important; font-size: 0.95rem !important; margin: 0 0 8px 0 !important; padding: 0 !important; display: block !important;
    }

    /* Estilo dos Inputs */
    input[type="text"], input[type="number"], textarea, select {
        width: 100% !important; max-width: 100% !important; background-color: #374151 !important; color: #ffffff !important; border: 1px solid #4b5563 !important; border-radius: 6px !important; padding: 12px 15px !important; font-size: 1rem !important; box-sizing: border-box !important;
    }
    input:focus, textarea:focus, select:focus { border-color: #14b8a6 !important; outline: none !important; }

    /* Força o Select e o Select2 (Jazzmin) a ficarem escuros */
    select { height: 45px !important; appearance: auto !important; }
    .select2-container { width: 100% !important; }
    .select2-container--default .select2-selection--single { height: 45px !important; display: flex !important; align-items: center !important; background-color: #374151 !important; border: 1px solid #4b5563 !important; border-radius: 6px !important;}
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #ffffff !important; padding-left: 15px !important;}
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 43px !important; }
    .select2-dropdown { background-color: #1f2937 !important; color: white !important; border: 1px solid #4b5563 !important; }

    /* =====================================================================
       5. SUB-CARTÕES (Opções de Resposta)
       ===================================================================== */
    .djn-group-nested {
        background-color: transparent !important; border: none !important; border-left: 4px solid #14b8a6 !important; padding: 5px 0 5px 20px !important; margin-top: 20px !important; width: 100% !important; box-sizing: border-box !important;
    }
    .djn-group-nested .djn-item {
        background: transparent !important; border: none !important; padding: 0 0 50px 0 !important; margin-bottom: 15px !important; border-bottom: 1px dashed #4b5563 !important; border-radius: 0 !important; box-shadow: none !important;
    }
    .djn-group-nested .djn-item:last-child { border-bottom: none !important; margin-bottom: 0 !important; }

    /* =====================================================================
       6. BOTÕES ADICIONAR E REMOVER
       ===================================================================== */
    .inline-deletelink, .djn-remove-handler, .delete {
        position: absolute !important; bottom: 15px !important; right: 15px !important; background-color: transparent !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; border-radius: 6px !important; padding: 6px 16px !important; font-size: 0.8rem !important; font-weight: bold !important; text-transform: uppercase !important; text-decoration: none !important; z-index: 10 !important; transition: 0.2s;
    }
    .inline-deletelink:hover, .djn-remove-handler:hover { background-color: #ef4444 !important; color: white !important; }
    .delete label { font-size: 0 !important; margin-left: 5px !important; cursor: pointer;}
    .delete label::after { content: "Remover"; font-size: 0.8rem !important;}

    /* Botão Adicionar "Fantasma" e Largo */
    .add-row, .djn-add-item { margin-top: 15px !important; padding: 0 !important; width: 100% !important; box-sizing: border-box !important;}
    .add-row a, .djn-add-item a, .djn-add-handler {
        background-color: transparent !important; color: #14b8a6 !important; border: 1px dashed #14b8a6 !important; padding: 12px !important; border-radius: 8px !important; font-weight: 700 !important; font-size: 1rem !important; text-decoration: none !important; display: block !important; text-align: center !important; transition: 0.2s; width: 100% !important; box-sizing: border-box !important;
    }
    .add-row a:hover, .djn-add-item a:hover, .djn-add-handler:hover { background-color: #14b8a6 !important; color: white !important; }

    /* =====================================================================
       7. BARRA DE SALVAR (SUBMIT ROW ALINHADA À DIREITA)
       ===================================================================== */
    /* Captura a row de submit via ID do form gerado no painel */
    form[id$="_form"] > div > .row:last-child, .submit-row {
        display: flex !important; flex-direction: row !important; justify-content: flex-end !important; flex-wrap: wrap !important; gap: 15px !important; background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 20px !important; margin-top: 30px !important; width: 100% !important; margin-left: 0 !important; margin-right: 0 !important;
    }

    form[id$="_form"] > div > .row:last-child input, .submit-row input, .submit-row a {
        width: auto !important; margin: 0 !important; display: inline-block !important; border-radius: 6px !important; padding: 10px 25px !important; font-weight: bold !important; font-size: 0.95rem !important;
    }

    input[name="_save"], .btn-success { background-color: #14b8a6 !important; color: white !important; border: none !important; }
    input[name="_save"]:hover, .btn-success:hover { background-color: #0d9488 !important; }

    input[name="_addanother"], input[name="_continue"] { background-color: #374151 !important; color: white !important; border: 1px solid #4b5563 !important; }
    input[name="_addanother"]:hover, input[name="_continue"]:hover { background-color: #4b5563 !important; }

</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    // JS Agora APENAS apaga texto. Não mexe NUNCA no layout/grid!
    function limparTextosInuteis() {
        document.querySelectorAll('h2, h3, legend, .inline_label').forEach(el => {
            let t = el.innerText.toLowerCase();
            if (t.includes('pergunta') || t.includes('escolha') || t.includes('opcao') || t.includes('opção') || t.includes('erguntas')) {
                el.style.setProperty('display', 'none', 'important');
            }
        });
    }

    window.addEventListener('load', function() {
        limparTextosInuteis();
        const observer = new MutationObserver(limparTextosInuteis);
        observer.observe(document.body, { childList: true, subtree: true });

        // Limpa Título H1
        const h1 = document.querySelector('.content-header h1');
        if (h1 && h1.innerHTML.includes('|')) { h1.innerHTML = h1.innerHTML.split('|')[0].trim(); }
        document.querySelectorAll('.nav-link').forEach(function(el) { if (el.textContent.trim() === 'General') { el.textContent = 'Principal'; } });

        // Menu de Conta
        const sidebar = document.querySelector('ul.nav-sidebar') || document.querySelector('.os-content ul');
        if (sidebar && !document.querySelector('#menu-conta-custom')) {
            sidebar.insertAdjacentHTML('beforeend', `
                <li id="menu-conta-custom" class="nav-header" style="color: #6b7280; font-size: 0.75rem; text-transform: uppercase; padding: 10px 15px 5px; margin-top: 15px;">Conta</li>
                <li class="nav-item"><a href="/admin/password_change/" class="nav-link"><i class="nav-icon fas fa-key" style="color: #9ca3af;"></i><p style="color: #d1d5db;">Alterar Senha</p></a></li>
                <li class="nav-item"><a href="{% url 'narrativa:logout' %}" class="nav-link"><i class="nav-icon fas fa-sign-out-alt" style="color: #ef4444;"></i><p style="color: #ef4444; font-weight: bold;">Sair</p></a></li>
            `);
        }
    });
</script>
{% endblock %}

{% block messages %}
    {{ block.super }}
{% endblock %}
