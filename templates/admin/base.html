{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* =====================================================================
       1. IDENTIDADE VISUAL E CORES GERAIS
       ===================================================================== */
    body, .content-wrapper, .main-footer { background-color: #111827 !important; color: #f3f4f6 !important; }
    .main-sidebar, .brand-link { background-color: #030712 !important; padding-top: 0 !important; }

    /* Remove a logo e textos do canto superior esquerdo */
    .brand-link { display: none !important; }

    /* =====================================================================
       2. LIMPEZA TOTAL DO MENU SUPERIOR (SÓ AS PESQUISAS FICAM)
       ===================================================================== */
    .main-header { background-color: #1f2937 !important; border-bottom: none !important; box-shadow: none !important; }
    .content-header { border-bottom: none !important; padding-top: 0 !important; }

    /* ESCONDE O HAMBÚRGUER E O USUÁRIO DO TOPO */
    .main-header .nav-item[data-widget="pushmenu"],
    .main-header .user-menu,
    .main-header .dropdown.user.user-menu {
        display: none !important;
    }

    /* Puxa as pesquisas para a direita e ajusta alinhamento */
    .main-header .navbar-nav { width: 100%; justify-content: flex-end; padding-right: 15px; }
    .main-header form.form-inline { margin: 0 5px !important; border: none !important; }

    /* =====================================================================
       3. TABELAS (CORRIGINDO O VÃO GIGANTE E AS CORES DOS BOTÕES)
       ===================================================================== */
    .table td, .table th { border-top: 1px solid #374151 !important; vertical-align: middle !important; }

    /* Faz a coluna dos botões ocupar só o espaço exato, colando-os no texto */
    .table td.text-right { width: 1%; white-space: nowrap; padding-right: 1.5rem !important; }

    /* Botões com alto contraste */
    .btn-success { background-color: #10b981 !important; color: #ffffff !important; border: none !important; }
    .btn-success:hover { background-color: #059669 !important; }

    .btn-info { background-color: #3b82f6 !important; color: #ffffff !important; border: none !important; }
    .btn-info:hover { background-color: #2563eb !important; }

    .btn-success i, .btn-info i { color: #ffffff !important; } /* Força ícones brancos */

    /* =====================================================================
       4. RESTAURANDO O MANUAL (FAQ) BONITO E LEGÍVEL
       ===================================================================== */
    .content-wrapper .card { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 12px; }
    .content-wrapper .card-body { color: #d1d5db !important; }

    /* Títulos em branco absoluto */
    .content-wrapper .card-body h1, .content-wrapper .card-body h2, .content-wrapper .card-body h3,
    .content-wrapper .card-body h4, .content-wrapper .card-body h5, .content-wrapper .card-body strong,
    .content-wrapper .card-body b {
        color: #ffffff !important;
    }

    /* Textos (como o glossário cinza) forçados para cinza claro legível */
    .content-wrapper .card-body p, .content-wrapper .card-body li, .content-wrapper .card-body span, .text-muted {
        color: #d1d5db !important;
    }

    .content-wrapper .card-body a { color: #34d399 !important; font-weight: bold; } /* Links em destaque verde */

    /* =====================================================================
       5. MENU LATERAL E INPUTS GERAIS
       ===================================================================== */
    .nav-sidebar .nav-item a[href*="faq"] p { font-weight: normal !important; color: #f3f4f6 !important; }
    .nav-sidebar .nav-item a[href*="faq"] { background-color: transparent !important; }

    .nav-pills .nav-link.active, .nav-pills .show > .nav-link { background-color: #0d9488 !important; color: white !important; }
    a:hover { color: #0d9488; text-decoration: none; }

    .form-control, input, select, textarea { background-color: #374151 !important; border: 1px solid #4b5563 !important; color: #f3f4f6 !important; }
    .form-control:focus, input:focus, select:focus, textarea:focus { border-color: #14b8a6 !important; background-color: #1f2937 !important; color: white !important; box-shadow: none !important; }
    ::placeholder { color: #9ca3af !important; opacity: 1 !important; }

    .select2-container--default .select2-selection--single { background-color: #374151 !important; border: 1px solid #4b5563 !important; height: 38px !important; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #f3f4f6 !important; line-height: 36px !important; }
    .select2-search--dropdown .select2-search__field { background-color: #1f2937 !important; color: white !important; border: 1px solid #4b5563 !important; }
    .select2-dropdown { background-color: #374151 !important; border-color: #4b5563 !important; color: white !important;}
    .select2-results__option[aria-selected="true"] { background-color: #0d9488 !important; }
    .main-header .input-group .btn { background-color: #4b5563 !important; color: white !important; border: none !important; }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        // --- 1. ALINHAMENTO PERFEITO DA FLECHINHA LATERAL ---
        const userPanel = document.querySelector('.sidebar .user-panel');
        if (userPanel) {
            const info = userPanel.querySelector('.info');
            userPanel.innerHTML = '';

            // Flexbox para jogar o e-mail pra esquerda e a seta pra direita
            userPanel.style.display = 'flex';
            userPanel.style.justifyContent = 'space-between';
            userPanel.style.alignItems = 'center';
            userPanel.style.padding = '15px';
            userPanel.style.borderBottom = '1px solid #1f2937';
            userPanel.style.marginBottom = '15px';

            if(info) {
                info.style.padding = '0';
                userPanel.appendChild(info);
            }

            // Flechinha (Substituta do hambúrguer)
            const arrowBtn = document.createElement('a');
            arrowBtn.href = '#';
            arrowBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            arrowBtn.style.cssText = 'color: #9ca3af; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; padding-left: 10px;';
            arrowBtn.onclick = function(e) {
                e.preventDefault();
                document.body.classList.toggle('sidebar-collapse');
            };
            userPanel.appendChild(arrowBtn);
        }

        // --- 2. SESSÃO DE CONTA NA BARRA LATERAL ---
        const sidebarMenu = document.querySelector('.nav-sidebar');
        if (sidebarMenu) {
            const contaHtml = `
                <li class="nav-header" style="color: #6b7280; font-size: 0.75rem; text-transform: uppercase; padding: 10px 15px 5px; margin-top: 15px;">Conta</li>
                <li class="nav-item">
                    <a href="/admin/password_change/" class="nav-link">
                        <i class="nav-icon fas fa-key" style="color: #9ca3af;"></i>
                        <p style="color: #d1d5db;">Alterar Senha</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/admin/logout/" class="nav-link">
                        <i class="nav-icon fas fa-sign-out-alt" style="color: #ef4444;"></i>
                        <p style="color: #ef4444; font-weight: bold;">Sair</p>
                    </a>
                </li>
            `;
            sidebarMenu.insertAdjacentHTML('beforeend', contaHtml);
        }
    });
</script>
{% endblock %}

{% block content %}
    {{ block.super }}
{% endblock %}
