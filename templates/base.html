<!DOCTYPE html>
<html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>
        {% block titulo %}
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Melhorias Globais de Mobile */
        body {
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
             /* MUDANÇA AQUI: Fundo base neutro escuro em vez de azul */
            background-color: #111827; /* gray-900 */
        }
        img, video, iframe {
            max-width: 100%;
            height: auto;
        }
        /* Ajuste para o footer ficar sempre embaixo */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
    </style>
    {% block head %}
    {% endblock %}
</head>
<body class="text-gray-100 font-sans antialiased">
    {% block navbar %}
        {% include 'navbar.html' %}
    {% endblock %}

    {% block content %}
    {% endblock %}

    <footer class="text-gray-200 px-5 py-8 bg-teal-800 mt-auto border-t border-teal-900">
        <ul class="flex flex-col md:flex-row justify-between items-center gap-4 container mx-auto">
            <li class="text-sm font-medium">&copy; 2025 Clínica Interativa</li>
            <li class="text-sm text-center">
                <a href="{% url 'narrativa:termos_de_uso' %}" class="hover:text-white transition">Termos de Uso</a> |
                <a href="{% url 'narrativa:politica_privacidade' %}" class="hover:text-white transition">Política de Privacidade</a>
            </li>
        </ul>
    </footer>

<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
<script>
    const nav = document.querySelector('nav');
    if(nav) {
        document.addEventListener("scroll", e => {
            if(window.scrollY > 50){
                nav.classList.add('bg-gray-900/95'); // Um pouco de transparência
                nav.classList.add('shadow-lg');
                nav.classList.add('backdrop-blur-sm');
            } else {
                nav.classList.remove('bg-gray-900/95');
                nav.classList.remove('shadow-lg');
                nav.classList.remove('backdrop-blur-sm');
            }
        });
    }
</script>
</body>
</html>
