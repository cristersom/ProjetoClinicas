<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block titulo %}
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}
    {% endblock %}
</head>
<body class="bg-blue-600 text-black-100 font-primary">
    {% block navbar %}
        {% include 'navbar.html' %}
    {% endblock %}
    {% block content %}
    {% endblock %}

    <footer class="text-gray-100 px-5 py-10 bg-blue-600">
        <ul class="flex justify-between items-center">
            <li>&copy; 2025</li>
            <li>
                <a href="{% url 'narrativa:termos_de_uso' %}" class="hover:underline">Termos de Uso</a> |
                <a href="{% url 'narrativa:politica_privacidade' %}" class="hover:underline">Política de Privacidade</a>
            </li>
            <li></li> {# Deixado em branco para manter o espaçamento #}
        </ul>
    </footer>
    <script>
    const nav = document.querySelector('nav')

    document.addEventListener("scroll",e=>{

        if(scrollY>100){
            if(scrollY>window.innerHeight){
            nav.classList.add('invisible')
        }else{
            nav.classList.add('bg-gray-900')
            nav.classList.remove('invisible')
        }
        }else{
            nav.classList.remove('bg-gray-900')
            nav.classList.remove('invisible')
        }
    })
</script>
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
