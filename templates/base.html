<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Narrativas Clínicas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; color: white !important; }
        .btn-red { background-color: #e50914; color: white; border: none; }
        .btn-red:hover { background-color: #b20710; color: white; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="/">NARRATIVAS<span style="color:#e50914">CLÍNICAS</span></a>
        <a href="{% url 'narrativa:login' %}" class="btn btn-red btn-sm">Login</a>
    </nav>

    {% block content %}{% endblock %}

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <small>&copy; 2025 Clínica Interativa |
                <a href="{% url 'narrativa:termos_de_uso' %}" class="text-secondary text-decoration-none">Termos de Uso</a> |
                <a href="{% url 'narrativa:politica_privacidade' %}" class="text-secondary text-decoration-none">Privacidade</a>
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
