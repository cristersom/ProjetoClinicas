<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Narrativas Clínicas{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased flex flex-col min-h-screen">

    {% block navbar %}
    <nav class="fixed w-full z-50 bg-gray-900/90 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'narrativa:home' %}" class="flex items-center gap-2">
                    <ion-icon name="medkit" class="text-2xl text-teal-500"></ion-icon>
                    <span class="font-bold text-xl text-white tracking-wide">NARRATIVAS<span class="text-teal-500 font-light">CLÍNICAS</span></span>
                </a>
                <div class="flex items-center gap-4">
                    {% if user.is_authenticated %}
                        <a href="{% url 'narrativa:narrativas' %}" class="text-sm font-medium text-gray-300 hover:text-white transition hidden md:block">Minhas Jornadas</a>
                        <a href="{% url 'narrativa:logout' %}" class="text-sm font-medium text-teal-500 border border-teal-500/50 hover:bg-teal-500/10 px-4 py-2 rounded-full transition">Sair</a>
                    {% else %}
                        <a href="{% url 'narrativa:login' %}" class="text-sm font-medium text-gray-300 hover:text-white transition">Entrar</a>
                        <a href="{% url 'narrativa:criarconta' %}" class="text-sm font-bold bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-full transition">Criar Conta</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    {% endblock %}

    {% block content %}{% endblock %}

</body>
</html>
