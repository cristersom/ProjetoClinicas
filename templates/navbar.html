{% load static %}

<nav class="flex text-gray-100 justify-between items-center py-3 px-4 fixed w-full z-50 transition-colors duration-300">
    <div class="flex-shrink-0">
      {% if logo_url %}
        <a href='/'>
        <img src="{{ logo_url }}" alt="logo" class="h-8 md:h-8 w-auto">
        </a>
      {% endif %}
    </div>

    {% if user.is_authenticated %}
    <div class="flex items-center gap-2">
          <div class="hidden md:block mr-2">
              <form method="get" action="{% url 'narrativa:pesquisa' %}">
                  <input class="py-1 px-2 rounded-md text-black text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" name="query" value="{{ request.GET.query }}" type="text" placeholder="Pesquisar...">
              </form>
          </div>

          <form method="post" action="{% url 'narrativa:logout' %}">
          {% csrf_token %}
           <button type="submit" class="bg-red-600 hover:bg-red-700 py-1 px-3 text-white text-sm md:text-base rounded-md font-medium transition shadow-md">
           Sair
           </button>
          </form>
    </div>
    {% else %}
        {% if "/paciente/" not in request.path %}
        <div class="flex justify-end">
          <div>
              <a href="{% url 'narrativa:login' %}" class="">
                <button class='bg-teal-600 hover:bg-teal-700 py-1 px-4 md:px-6 text-white text-sm md:text-base rounded-md font-bold transition shadow-lg border border-teal-500'>
                    Login
                </button>
              </a>
          </div>
        </div>
        {% endif %}
    {% endif %}
</nav>
