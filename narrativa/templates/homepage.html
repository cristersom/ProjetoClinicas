{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrativas Clínicas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .bg-custom {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                        url("{% static 'background.png' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .navbar-custom {
            position: absolute;
            top: 20px;
            right: 40px;
            z-index: 10;
        }

        .btn-login {
            background-color: #e50914;
            color: white;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #b20710;
            color: white;
        }

        .content-box {
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        h1 span {
            color: #e50914;
        }

        .lead {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .form-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="email"] {
            padding: 15px;
            width: 400px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        button {
            background-color: #e50914;
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #b20710;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            input[type="email"] { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <a href="{% url 'narrativa:login' %}" class="btn-login">Login</a>
    </nav>

    <div class="bg-custom">
        <div class="content-box">
            <h1>Narrativas clínicas e <span>pesquisas de satisfação</span>, tudo em um só lugar.</h1>
            <p class="lead">Crie onde quiser. Aplique quando quiser.</p>

            <form method="post" action="{% url 'narrativa:login' %}" class="form-container">
                {% csrf_token %}
                <input type="email" name="email" placeholder="Seu e-mail" required>
                <button type="submit">Acessar</button>
            </form>

            <p class="mt-3 text-light opacity-75">Digite seu e-mail para iniciar ou criar uma conta.</p>
        </div>
    </div>

    {% block content %}
    {% endblock %}

</body>
</html>
