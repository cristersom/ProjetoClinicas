{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo - Gameflix Clínicas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-custom {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'background.png' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .content-box { max-width: 800px; padding: 20px; }
        h1 { font-weight: 800; font-size: 3.5rem; margin-bottom: 20px; }
        h1 span { color: #20c997; }
        .form-container {
            background: white;
            padding: 5px;
            border-radius: 8px;
            display: flex;
            margin-top: 30px;
        }
        .form-container input {
            border: none;
            padding: 15px;
            flex-grow: 1;
            border-radius: 8px 0 0 8px;
            outline: none;
            color: #333;
        }
        .form-container button {
            background-color: #008080;
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 0 8px 8px 0;
            font-weight: bold;
            transition: 0.3s;
        }
        .form-container button:hover { background-color: #006666; }
        .navbar-custom { position: absolute; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: flex-end; }
        .btn-login {
            background-color: #20c997;
            color: white;
            border-radius: 8px;
            padding: 8px 25px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <a href="/admin/login/" class="btn-login">Login</a>
    </nav>

    <div class="bg-custom">
        <div class="content-box">
            <h1>Narrativas clínicas e <span>pesquisas de satisfação</span>, tudo em um só lugar.</h1>
            <p class="lead">Crie onde quiser. Aplique quando quiser.</p>

            <form method="post" action="{% url 'narrativa:login' %}" class="form-container">
                {% csrf_token %}
                <input type="email" name="email" placeholder="Seu e-mail" required>
                <button type="submit">Acessar</button>
            </form>
            <p class="mt-3 text-light opacity-75">Digite seu e-mail para iniciar ou criar uma conta.</p>
        </div>
    </div>

</body>
</html>
