{% extends 'base.html' %}

{% block navbar %}
    {% endblock %}

{% load static %}
{% load crispy_forms_tags %}

{% block titulo %}
Criar Conta
{% endblock %}

{% block head %}
<style>
    /* Estilos essenciais */
    .form-text, .invalid-feedback {
        color: white !important;
        /* GARANTE ALINHAMENTO ESQUERDO E POSICIONAMENTO CENTRAL */
        text-align: left !important;
        width: 90%;
        margin: 0 auto 10px auto !important; /* Centraliza o bloco de texto */
        display: block;
        padding: 0;
    }

    /* CORREÇÃO CHAVE: Define a largura máxima do formulário e centraliza como bloco */
    .z-10 form {
        text-align: left;
        max-width: 450px; /* Largura fixa para centralização limpa */
        margin-left: auto;
        margin-right: auto;
        padding: 0 15px;
    }

    /* ALINHAMENTO DE LABELS E INPUTS */

    /* Centraliza visualmente o texto da Label e o Input */
    .control-label,
    .form-group label:not(.form-check-label) {
        text-align: left !important;
        width: 90%; /* Deve herdar a largura do input para alinhamento */
        margin-left: auto !important;
        margin-right: auto !important;
        display: block;
    }

    /* Força a legenda do fieldset a ser centralizada */
    .z-10 fieldset legend {
        text-align: center !important;
    }

    /* ALINHAMENTO DO INPUT: Garante 90% de largura e centralização visual */
    .z-10 input[type="text"],
    .z-10 input[type="email"],
    .z-10 input[type="password"] {
        width: 90% !important;
        margin: 0 auto 10px auto !important; /* Centraliza o input */
        display: block;
    }

    /* CORREÇÃO 3: Checkbox (Aceite) - Garante alinhamento e fonte menor */
    .form-group .form-check {
        padding-top: 15px;
        margin-bottom: 25px;
        text-align: left;
        display: flex;
        align-items: center;
        width: 95%;
        margin-left: auto;
        margin-right: auto;
        font-size: 0.9rem; /* Diminui a fonte para evitar quebra de linha */
        white-space: nowrap;
    }

    /* NOVO AJUSTE: Garante espaçamento entre o checkbox e o texto. */
    .form-group .form-check .form-check-input {
        margin-right: 0.5em; /* Adiciona um espaço à direita do checkbox */
    }

    .form-group .form-check label {
        font-weight: normal !important;
        white-space: nowrap;
    }

    /* Estilo para negrito e sublinhado no link */
    .termos-link {
        font-weight: bold;
        text-decoration: underline;
        color: #dc2626 !important;
    }

    /* Corrige o padding vertical do container principal */
    .z-10.h-full {
        padding-top: 50px !important;
        padding-bottom: 50px !important;
    }

</style>
{% endblock %}

{% block content %}
    <header class="min-h-screen bg-black bg-opacity-75 bg-blend-overlay showcase border-gray-600 border-b-8 flex justify-center items-center bg-no-repeat"  style="background-image: url('{% static 'images/background.png' %}');">
        <div class="z-10 h-full py-32 md:py-0 text-gray-100 flex justify-center items-center flex-col p-5">
            <form method="post">
                {% csrf_token %}
                <fieldset class="form-group">
                    <legend class="border-bottom mb-4">Crie uma conta para continuar</legend>
                    {{ form|crispy }}
                </fieldset>
                <button class="bg-red-600 py-1 px-3 text-white w-full md:text-lg rounded-md" type="submit">Criar Conta</button>
            </form>
            <script>
                // Acha o label e o link injetado pelo crispy-forms
                const label = document.querySelector('label[for="id_aceite_termos"]');
                const termosLink = label ? label.querySelector('a') : null;

                if (label && termosLink) {
                    const termosUrl = "{% url 'narrativa:termos_de_uso' %}";
                    const politicaUrl = "{% url 'narrativa:politica_privacidade' %}";

                    // Reconstroi o HTML do label com os dois links formatados
                    label.innerHTML = `Aceita nossos
                        <a href="${termosUrl}" target="_blank" class="termos-link">termos de uso</a> e
                        <a href="${politicaUrl}" target="_blank" class="termos-link">política de privacidade</a>?`;
                }
            </script>
        </div>
    </header>

    {% endblock %}
