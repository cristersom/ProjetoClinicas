{% extends 'base.html' %}
{% block titulo %}Pesquisa{% endblock %}

{% block content %}
<main class='bg-gray-900 min-h-screen w-full'>
    <section class='min-h-screen flex justify-center py-10'>
        <div class="p-8 w-10/12 relative" >
            <h2 class="text-white text-2xl font-medium mb-6 border-l-4 border-teal-500 pl-3">
                Resultados da Busca
            </h2>

            <div class="flex flex-wrap items-start min-w-full gap-6">
                {% for narrativa in object_list %}
                    <div class="w-full md:w-1/4 lg:w-1/5 relative group bg-gray-800 rounded-xl overflow-hidden shadow-lg border border-gray-700 hover:border-teal-500/50 transition-all">
                        <a href="{% url 'narrativa:detalhes' narrativa.pk %}">
                            <div class="aspect-video w-full overflow-hidden">
                                <img src="{{ narrativa.thumb.url }}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 opacity-90 group-hover:opacity-100">
                            </div>
                            <div class="p-4">
                                <p class="text-white font-bold truncate text-lg">{{ narrativa.titulo }}</p>
                                <p class="text-teal-400 text-xs font-bold uppercase tracking-wide mt-1">Ver Detalhes</p>
                            </div>
                        </a>
                    </div>
                {% empty %}
                    <div class="w-full flex flex-col items-center justify-center pt-20 text-gray-500">
                        <ion-icon name="search-outline" class="text-6xl mb-4 opacity-20"></ion-icon>
                        <p class="text-xl">Nenhuma narrativa encontrada.</p>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
</main>
{% endblock %}
