{% extends "admin/base_site.html" %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1 class="h3 mb-4 text-gray-800">Resumo de Atividades: <strong>{{ request.user.clinica.nome }}</strong></h1>
        </div>
    </div>

    <div class="row">
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Suas Jornadas Criadas</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">{{ kpi_narrativas }}</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-book-medical fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Pacientes que Iniciaram</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">{{ kpi_sessoes }}</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-user-injured fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Respostas Coletadas</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">{{ kpi_respostas }}</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-clipboard-check fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/admin/narrativa/narrativa/add/" class="btn btn-primary btn-lg"> + Criar Nova Jornada</a>
    </div>
</div>
{% endblock %}
