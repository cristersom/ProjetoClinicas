{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-12">
            <h2 class="fw-bold">Painel da Clínica: <span class="text-teal">{{ request.user.clinica.nome }}</span></h2>
            <hr>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Sessões de Pacientes</h5>
                    <h3>{{ kpi_sessoes }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5>Total de Respostas</h5>
                    <h3>{{ kpi_respostas }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-info text-white shadow">
                <div class="card-body">
                    <h5>Jornadas Ativas</h5>
                    <h3>{{ kpi_narrativas }}</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">Visualizações por Jornada</div>
                <div class="card-body">
                    <canvas id="topNarrativasChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('topNarrativasChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: JSON.parse('{{ chart_top_labels|safe }}'),
            datasets: [{
                label: 'Visualizações',
                data: JSON.parse('{{ chart_top_data|safe }}'),
                backgroundColor: '#20c997'
            }]
        },
        options: { responsive: true }
    });
</script>

<style>
    .text-teal { color: #20c997; }
</style>
{% endblock %}
