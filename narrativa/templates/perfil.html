{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block titulo %}Minha Conta{% endblock %}

{% block head %}
<style>
    /* Estilos para o formulário Dark */
    .form-group label { color: #d1d5db; font-weight: 500; margin-bottom: 0.5rem; }
    .form-control {
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        color: #fff !important;
        padding: 0.75rem;
        border-radius: 0.5rem;
    }
    .form-control:focus {
        border-color: #0d9488 !important;
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2) !important;
    }
</style>
{% endblock %}

{% block content %}
    <header class="min-h-screen flex justify-center items-center bg-fixed bg-cover bg-center relative py-24" style="background-image: url('{% static 'images/background.png' %}');">

        <div class="absolute inset-0 bg-gray-900/90 backdrop-blur-sm"></div>

        <div class="z-10 w-full max-w-lg px-4">
            <div class="bg-gray-800/90 border border-gray-700 p-8 rounded-2xl shadow-2xl">

                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-900/30 mb-4 ring-1 ring-teal-500/30">
                        <ion-icon name="person-circle" class="text-4xl text-teal-400"></ion-icon>
                    </div>
                    <h2 class="text-2xl font-bold text-white">Editar Conta</h2>
                    <p class="text-gray-400 text-sm mt-2">Administrador: <span class="text-teal-300 font-mono">{{ user.username }}</span></p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <fieldset class="form-group mb-6 space-y-4">
                        {{ form|crispy }}
                    </fieldset>

                    <div class="flex flex-col gap-3 mt-8">
                        <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg flex items-center justify-center" type="submit">
                            <ion-icon name="save-outline" class="mr-2 text-lg"></ion-icon>
                            Salvar Alterações
                        </button>

                        <a href="{% url 'narrativa:narrativas' %}" class="w-full">
                            <button type="button" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium py-3 px-4 rounded-lg transition border border-gray-600">
                                Cancelar e Voltar
                            </button>
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </header>
{% endblock %}
