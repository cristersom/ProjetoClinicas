{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block titulo %}Editar Perfil{% endblock %}

{% block content %}
    <header class="min-h-screen flex justify-center items-center bg-no-repeat bg-cover bg-center relative" style="background-image: url('{% static 'images/background.png' %}');">
        <div class="absolute inset-0 bg-gray-900/90"></div>

        <div class="z-10 w-full max-w-md p-8 bg-gray-800 border border-gray-700 rounded-xl shadow-2xl mx-4">
            <div class="text-center mb-8">
                <ion-icon name="person-circle" class="text-6xl text-teal-500 mb-2"></ion-icon>
                <h2 class="text-2xl font-bold text-white">Editar Perfil</h2>
                <p class="text-gray-400 text-sm">Atualize suas informações de administrador</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <fieldset class="form-group text-left text-gray-300 mb-6">
                    {{ form|crispy }}
                </fieldset>

                <div class="flex flex-col gap-3">
                    <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg" type="submit">
                        Salvar Alterações
                    </button>
                    <a href="{% url 'narrativa:narrativas' %}" class="w-full">
                        <button type="button" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium py-3 px-4 rounded-lg transition">
                            Cancelar
                        </button>
                    </a>
                </div>
            </form>
        </div>
    </header>
{% endblock %}
