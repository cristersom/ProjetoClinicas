{% extends 'base.html' %}
{% load static %}

{% block navbar %}{% endblock %}
{% block titulo %}Termos de Uso{% endblock %}

{% block head %}
<style>
    /* Caixa de texto com rolagem e estilo dark */
    .termo-box {
        max-height: 400px;
        overflow-y: auto;
        padding: 1.5rem;
        background-color: #1f2937; /* gray-800 */
        border: 1px solid #374151; /* gray-700 */
        border-radius: 0.5rem;
        color: #d1d5db; /* gray-300 */
        line-height: 1.7;
        font-size: 0.95rem;
    }

    /* Scrollbar customizada para combinar */
    .termo-box::-webkit-scrollbar { width: 8px; }
    .termo-box::-webkit-scrollbar-track { background: #111827; }
    .termo-box::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    .termo-box::-webkit-scrollbar-thumb:hover { background: #0d9488; }

    /* Checkbox customizado Teal */
    .form-check-input:checked {
        background-color: #0d9488;
        border-color: #0d9488;
    }
</style>
{% endblock %}

{% block content %}
<main class="min-h-screen w-full flex justify-center items-center p-4 bg-fixed bg-center bg-cover relative" style="background-image: url('{% static 'images/background.png' %}');">

    <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm fixed"></div>

    <div class="w-full md:w-8/12 lg:w-6/12 bg-gray-900/90 backdrop-blur-md rounded-xl shadow-2xl border border-gray-700 p-8 relative z-10 my-8">

        <div class="absolute top-4 left-4">
             <a href="#" onclick="window.history.back(); return false;" class="text-gray-400 hover:text-white transition flex items-center text-sm font-medium">
                 <ion-icon name="arrow-back" class="mr-1"></ion-icon> Voltar
             </a>
        </div>

        <h1 class="text-2xl md:text-3xl font-bold mb-2 text-center text-white mt-4">Termos e Privacidade</h1>
        <p class="text-center text-gray-400 mb-6 text-sm">
            Leia atentamente para prosseguir com a jornada.
        </p>

        <div id="termoTexto" class="termo-box mb-6 shadow-inner">
            <div class="flex justify-center py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-500"></div>
            </div>
        </div>

        <div class="flex items-center justify-center mb-8 bg-gray-800/50 p-4 rounded-lg border border-gray-700">
            <input id="agreeCheckbox" type="checkbox" class="h-5 w-5 rounded border-gray-600 bg-gray-700 text-teal-600 focus:ring-teal-500 transition cursor-pointer form-check-input">
            <label for="agreeCheckbox" class="ml-3 block text-sm md:text-base font-medium text-gray-200 cursor-pointer select-none">
                Li e concordo com os termos de uso e política de privacidade.
            </label>
        </div>

        <div class="text-center">
            <button id="acceptBtn" disabled class="w-full md:w-auto bg-teal-600 hover:bg-teal-700 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-bold py-3.5 px-10 rounded-lg transition-all duration-300 shadow-lg flex items-center justify-center mx-auto group">
                <span>Aceitar e Continuar</span>
                <ion-icon name="arrow-forward" class="ml-2 group-hover:translate-x-1 transition-transform"></ion-icon>
            </button>
        </div>
    </div>
</main>

<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

<script>
document.addEventListener('DOMContentLoaded', () => {
    const termoTextoEl = document.getElementById('termoTexto');
    const checkbox = document.getElementById('agreeCheckbox');
    const acceptBtn = document.getElementById('acceptBtn');
    const termosUrl = "{% url 'narrativa:termos_de_uso' %}";
    const csrfTokenInput = document.querySelector('input[name="csrfmiddlewaretoken"]');
    const csrftoken = csrfTokenInput ? csrfTokenInput.value : '';

    // Busca o conteúdo da página de termos
    fetch(termosUrl)
        .then(response => {
            if (!response.ok) { throw new Error('Erro ao carregar'); }
            return response.text();
        })
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            // Tenta pegar o conteúdo principal da página de termos
            const mainContent = doc.querySelector('main .w-full');

            if (mainContent) {
                // Limpa elementos de navegação internos se existirem (títulos duplicados, botão voltar)
                const title = mainContent.querySelector('h1'); if (title) title.remove();
                const backButton = mainContent.querySelector('.absolute'); if (backButton) backButton.remove();

                termoTextoEl.innerHTML = mainContent.innerHTML;
            } else {
                termoTextoEl.innerHTML = '<p class="text-center text-red-400">Conteúdo não encontrado.</p>';
            }
        })
        .catch(error => {
            console.error(error);
            termoTextoEl.innerHTML = '<p class="text-center text-red-400">Falha ao carregar termos de uso.</p>';
        });

    // Habilita/Desabilita botão
    checkbox.addEventListener('change', () => {
        acceptBtn.disabled = !checkbox.checked;
        if (!acceptBtn.disabled) {
            acceptBtn.classList.remove('bg-gray-700');
            acceptBtn.classList.add('bg-teal-600');
        }
    });

    // Envia o aceite
    acceptBtn.addEventListener('click', () => {
        if (checkbox.checked) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = window.location.href;

            const csrfInput = document.createElement('input');
            csrfInput.type = 'hidden';
            csrfInput.name = 'csrfmiddlewaretoken';
            csrfInput.value = csrftoken;
            form.appendChild(csrfInput);

            const aceiteInput = document.createElement('input');
            aceiteInput.type = 'hidden';
            aceiteInput.name = 'aceite';
            aceiteInput.value = 'true';
            form.appendChild(aceiteInput);

            document.body.appendChild(form);
            form.submit();
        }
    });
});
</script>
{% endblock %}
