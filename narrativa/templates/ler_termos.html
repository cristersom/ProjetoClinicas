<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block titulo %}{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Estilos Globais Dark/Teal */
        body {
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-color: #111827; /* gray-900 (Fundo Escuro Padrão) */
        }
        
        img, video, iframe { 
            max-width: 100%; 
            height: auto; 
        }
        
        /* Layout Flex para o rodapé ficar sempre embaixo */
        body { 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        main { 
            flex: 1; 
        }
        
        /* Ajuste para input autofill do Chrome não ficar amarelo/branco */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #1f2937 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="text-gray-100 font-sans antialiased">
    
    {% block navbar %}
        {% include 'navbar.html' %}
    {% endblock %}
    
    {% block content %}
    {% endblock %}

    <footer class="text-gray-400 px-5 py-8 bg-gray-900 border-t border-gray-800 mt-auto">
        <ul class="flex flex-col md:flex-row justify-between items-center gap-4 container mx-auto">
            <li class="text-sm">&copy; 2025 Clínica Interativa</li>
            <li class="text-sm text-center">
                <a href="{% url 'narrativa:termos_de_uso' %}" class="hover:text-teal-400 transition">Termos de Uso</a> |
                <a href="{% url 'narrativa:politica_privacidade' %}" class="hover:text-teal-400 transition">Política de Privacidade</a>
            </li>
        </ul>
    </footer>

<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
<script>
    // Script para efeito Glass na Navbar ao rolar
    const nav = document.querySelector('nav');
    if(nav) {
        document.addEventListener("scroll", e => {
            if(window.scrollY > 20){
                nav.classList.add('bg-gray-900/90');
                nav.classList.add('backdrop-blur-md');
                nav.classList.add('shadow-md');
                nav.classList.add('border-b');
                nav.classList.add('border-gray-800');
            } else {
                nav.classList.remove('bg-gray-900/90');
                nav.classList.remove('backdrop-blur-md');
                nav.classList.remove('shadow-md');
                nav.classList.remove('border-b');
                nav.classList.remove('border-gray-800');
            }
        });
    }
</script>
</body>
</html>
