{% extends 'base.html' %}
{% load static %}

{% block titulo %}Logout{% endblock %}

{% block content %}
    <header class="min-h-screen flex items-center justify-center bg-gray-900 bg-cover bg-center" style="background-image: url('{% static 'images/background.png' %}');">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 max-w-md w-full text-center">

            <h2 class="text-3xl font-bold text-white mb-2">Até logo!</h2>
            <p class="text-gray-400 mb-8">Você saiu da sua conta com segurança.</p>

            <div class="flex flex-col gap-3">
                <a href="{% url 'narrativa:login' %}">
                    <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg">
                        Fazer Login Novamente
                    </button>
                </a>
                <!-- AQUI ESTÁ A CORREÇÃO: url 'narrativa:home' -->
                <a href="{% url 'narrativa:home' %}">
                    <button class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium py-3 px-4 rounded-lg transition">
                        Voltar para Início
                    </button>
                </a>
            </div>

        </div>
    </header>
{% endblock %}
