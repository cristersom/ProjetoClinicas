{% extends 'base.html' %}
{% load static %}
{% block titulo %}Logout{% endblock %}

{% block content %}
    <header class="min-h-screen flex justify-center items-center bg-no-repeat bg-cover bg-center relative" style="background-image: url('{% static 'images/background.png' %}');">
        <div class="absolute inset-0 bg-gray-900/90 backdrop-blur-sm"></div>

        <div class="z-10 text-center p-8 bg-gray-800/80 border border-gray-700 rounded-2xl shadow-2xl max-w-md w-full mx-4">
            <div class="mb-6">
                <ion-icon name="log-out-outline" class="text-6xl text-teal-500"></ion-icon>
            </div>

            <h2 class="text-3xl font-bold text-white mb-2">Até logo!</h2>
            <p class="text-gray-400 mb-8">Você saiu da sua conta com segurança.</p>

            <div class="flex flex-col gap-3">
                <a href="{% url 'narrativa:login' %}">
                    <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg">
                        Fazer Login Novamente
                    </button>
                </a>
                <a href="{% url 'narrativa:homepage' %}">
                    <button class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium py-3 px-4 rounded-lg transition">
                        Voltar para Início
                    </button>
                </a>
            </div>
        </div>
    </header>
{% endblock %}
