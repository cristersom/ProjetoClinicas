{% extends 'base.html' %}
{% load static %}

{% block titulo %}Entrar - Narrativas Clínicas{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center bg-gray-900 bg-cover bg-center relative" style="background-image: url('{% static 'images/background.png' %}');">
    <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm"></div>

    <div class="z-10 w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 md:p-10 relative mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-100 mb-4">
                <ion-icon name="medkit" class="text-3xl text-teal-600"></ion-icon>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Entre em sua conta</h2>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                    Usuário ou senha incorretos. Tente novamente.
                </div>
            {% endif %}

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2" for="id_username">E-mail ou Usuário</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <ion-icon name="person-outline" class="text-gray-400 text-lg"></ion-icon>
                    </div>
                    <input type="text" name="username" id="id_username" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors" required>
                </div>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2" for="id_password">Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <ion-icon name="lock-closed-outline" class="text-gray-400 text-lg"></ion-icon>
                    </div>
                    <input type="password" name="password" id="id_password" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-lg mt-2">
                Entrar
            </button>
        </form>

        <div class="mt-8 text-center text-sm border-t border-gray-100 pt-6">
            <span class="text-gray-600">Não tem conta?</span>
            <a href="{% url 'narrativa:criarconta' %}" class="text-teal-600 font-bold hover:text-teal-800 transition">Cadastre-se</a>
        </div>
    </div>
</main>
{% endblock %}
