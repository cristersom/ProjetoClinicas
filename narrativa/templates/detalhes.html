{% extends 'base.html' %}

{% block titulo %}
    Detalhes da Narrativa
{% endblock %}

{% block content %}
<main class='bg-primary_black min-h-screen w-full overflow-x-hidden'>

    <section class="min-h-[80vh] md:h-screen relative bg-no-repeat flex items-end bg-cover bg-center" style="background-image: url('{{ object.thumb.url }}');">
        <div class="bg-gradient-to-t from-black via-black/80 to-transparent w-full p-6 md:p-12 pb-20 md:pb-16">

            <h2 class="text-3xl md:text-6xl font-bold text-white mb-4 leading-tight drop-shadow-lg">
                {{ object.titulo }}
            </h2>

            <p class="text-gray-200 text-sm md:text-xl font-medium mb-8 w-full md:w-6/12 line-clamp-4 md:line-clamp-none drop-shadow-md">
                {{ object.descricao }}
            </p>

            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto flex-wrap">
                <a href="{% url 'narrativa:iniciar_jornada_paciente' narrativa_id=object.pk %}" target="_blank" class="w-full md:w-auto">
                    <button class="flex justify-center items-center bg-white hover:bg-gray-200 text-black py-3 px-6 rounded-md font-bold w-full md:w-auto transition shadow-md">
                        <ion-icon name="play" class="text-xl mr-2"></ion-icon>
                        Preview Paciente
                    </button>
                </a>

                <button id="copy-button" onclick="copyLinkToClipboard()" class="flex justify-center items-center bg-gray-700 hover:bg-gray-600 text-white py-3 px-6 rounded-md font-bold w-full md:w-auto transition shadow-md">
                    <ion-icon name="clipboard-outline" class="text-xl mr-2"></ion-icon>
                    <span id="copy-button-text">Copiar Link</span>
                </button>

                <button id="share-button" onclick="shareLink()" class="flex justify-center items-center bg-teal-600 hover:bg-teal-700 text-white py-3 px-6 rounded-md font-bold w-full md:w-auto transition shadow-md" style="display: none;">
                    <ion-icon name="share-social-outline" class="text-xl mr-2"></ion-icon>
                    Encaminhar
                </button>
            </div>
        </div>
    </section>

    <section class='bg-primary_black flex justify-center py-10 px-4'>
        <div class="w-full md:w-10/12 relative" >
            <h2 class="text-gray-200 text-2xl md:text-3xl font-medium mb-4 tracking-wide">
                Descrição Completa
            </h2>
            <div class="flex justify-left items-center w-full bg-gray-900/50 p-6 rounded-lg">
                <p class="text-gray-300 text-base md:text-lg leading-relaxed">
                    {{ object.descricao }}
                    <br><br>
                    <span class="text-teal-400 font-medium flex items-center"> <ion-icon name="eye" class="mr-2"></ion-icon>
                        Visualizações: {{object.visualizacoes}}
                    </span>
                </p>
            </div>
             </main>
{% endblock %}
