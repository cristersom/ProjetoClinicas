<div class="container text-center">
    <h2 class="display-5 fw-bold mb-2">Escolha seu Plano</h2>
    <p class="text-muted mb-5">Selecione a melhor opção para impulsionar suas narrativas clínicas.</p>

    <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
        {% for plano in planos %}
        <div class="col" style="max-width: 350px;">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-header py-3 text-white bg-primary">
                    <h4 class="my-0 fw-normal">{{ plano.nome }}</h4>
                </div>
                <div class="card-body d-flex flex-column">
                    <h1 class="card-title pricing-card-title">R$ {{ plano.preco }}<small class="text-muted fw-light">/mês</small></h1>
                    <ul class="list-unstyled mt-3 mb-4">
                        <li class="py-2 border-bottom">{{ plano.descricao }}</li>
                    </ul>
                    <a href="{% url 'narrativa:criar_checkout_sessao' price_id=plano.pid %}" class="w-100 btn btn-lg btn-primary mt-auto">
                        Assinar Agora
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-muted">Nenhum plano disponível no momento. Verifique o Painel Admin.</p>
        {% endfor %}
    </div>
</div>
