<div class="container">
    <div class="text-center mb-5">
        <h2 class="display-5 fw-bold text-dark">Escolha seu Plano</h2>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for plano in planos %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-header py-3 bg-dark text-white text-center">
                    <h4 class="my-0 fw-bold">{{ plano.nome }}</h4>
                </div>
                <div class="card-body d-flex flex-column text-center">
                    <h1 class="card-title pricing-card-title">
                        {% if plano.nome == 'Básico' %}R$ 49,90{% elif plano.nome == 'Profissional' %}R$ 99,90{% else %}R$ 199,90{% endif %}
                    </h1>
                    <p class="mt-3 mb-4">{{ plano.descricao }}</p>

                    <a href="{% url 'narrativa:criar_checkout_sessao' price_id=plano.pid %}"
                       class="w-100 btn btn-lg mt-auto fw-bold" style="background-color: #e50914; color: white;">
                        Assinar Agora
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
