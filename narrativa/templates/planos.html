{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h2 class="text-center">Nossos Planos</h2>
    <div class="row">
        {% for plano in planos %}
             <div class="col-md-4">
                 <h3>{{ plano.nome }}</h3>
                 <p>{{ plano.descricao }}</p>
                 <a href="{% url 'narrativa:checkout' plano.pid %}" class="btn btn-primary">Assinar</a>
             </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
